version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: friends-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_USER: ${DB_USER:-friends}
      POSTGRES_PASSWORD: ${DB_PASS:-friends}
      POSTGRES_DB: ${DB_NAME:-friends_db}
    ports:
      - "${DB_PORT:-5454}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-friends} -d ${DB_NAME:-friends_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: friends-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  friends:
    container_name: friends-app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ADDR: 0.0.0.0
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: postgres://${DB_USER:-friends}:${DB_PASS:-friends}@postgres:5432/${DB_NAME:-friends_db}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MIGRATION_PATH: /friends/internal/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: "256M"
          cpus: "0.5"
        reservations:
          memory: "128M"
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
