version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: friends-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_USER: ${DB_USER:-friends}
      POSTGRES_PASSWORD: ${DB_PASS:-friends}
      POSTGRES_DB: ${DB_NAME:-friends_db}
    ports:
      - "${DB_PORT:-5454}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-friends} -d ${DB_NAME:-friends_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: friends-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
