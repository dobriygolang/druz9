name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Test backend
        working-directory: api
        run: go test ./...

      - name: Build frontend
        working-directory: front
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "api,front,deploy"
          target: "~/apps/druz9"
          strip_components: 0
          overwrite: true
          rm: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_HOST: ${{ secrets.APP_HOST }}
          API_HOST: ${{ secrets.API_HOST }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          TELEGRAM_BOT_NAME: ${{ secrets.TELEGRAM_BOT_NAME }}
          ARENA_REQUIRE_AUTH: ${{ secrets.ARENA_REQUIRE_AUTH }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          S3_PUBLIC_ENDPOINT: ${{ secrets.S3_PUBLIC_ENDPOINT }}
          S3_HOST: ${{ secrets.S3_HOST }}
          MINIO_CONSOLE_HOST: ${{ secrets.MINIO_CONSOLE_HOST }}
          MINIO_CONSOLE_BASIC_AUTH: ${{ secrets.MINIO_CONSOLE_BASIC_AUTH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_HOST,API_HOST,APP_EMAIL,TELEGRAM_BOT_NAME,ARENA_REQUIRE_AUTH,POSTGRES_DB,POSTGRES_USER,S3_BUCKET,S3_REGION,COOKIE_DOMAIN,S3_PUBLIC_ENDPOINT,S3_HOST,MINIO_CONSOLE_HOST,MINIO_CONSOLE_BASIC_AUTH,DATABASE_URL,POSTGRES_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,S3_ACCESS_KEY,S3_SECRET_KEY,TELEGRAM_BOT_TOKEN
          script: |
            set -euo pipefail
            cd ~/apps/druz9
            mkdir -p deploy/runtime/secrets/prod

            cat > deploy/.env.prod <<EOF
            APP_HOST=${APP_HOST}
            API_HOST=${API_HOST}
            APP_EMAIL=${APP_EMAIL}
            TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
            ARENA_REQUIRE_AUTH=${ARENA_REQUIRE_AUTH}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            S3_BUCKET=${S3_BUCKET}
            S3_REGION=${S3_REGION}
            COOKIE_DOMAIN=${COOKIE_DOMAIN}
            S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}
            S3_HOST=${S3_HOST}
            MINIO_CONSOLE_HOST=${MINIO_CONSOLE_HOST}
            MINIO_CONSOLE_BASIC_AUTH=${MINIO_CONSOLE_BASIC_AUTH}
            EOF

            printf '%s' "${DATABASE_URL}" > deploy/runtime/secrets/prod/database_url
            printf '%s' "${POSTGRES_PASSWORD}" > deploy/runtime/secrets/prod/postgres_password
            printf '%s' "${MINIO_ROOT_USER}" > deploy/runtime/secrets/prod/minio_root_user
            printf '%s' "${MINIO_ROOT_PASSWORD}" > deploy/runtime/secrets/prod/minio_root_password
            printf '%s' "${S3_ACCESS_KEY}" > deploy/runtime/secrets/prod/s3_access_key
            printf '%s' "${S3_SECRET_KEY}" > deploy/runtime/secrets/prod/s3_secret_key
            printf '%s' "${TELEGRAM_BOT_TOKEN}" > deploy/runtime/secrets/prod/telegram_bot_token

            chmod 600 deploy/.env.prod deploy/runtime/secrets/prod/*
            bash deploy/scripts/deploy.sh
