services:
  postgres:
    image: postgres:15-alpine
    container_name: podcast-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-podcast}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-podcast}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - podcast_network

  minio:
    image: minio/minio:latest
    container_name: podcast-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - podcast_network

  minio-init:
    image: minio/mc:latest
    container_name: podcast-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-platform-podcasts}
    entrypoint: >
      /bin/sh -c "
      mc alias set local $$S3_ENDPOINT $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET
      "
    networks:
      - podcast_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: podcast-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_CONFIG_PATH: /app/configs/config.yaml
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/podcast?sslmode=disable}
      DB_DRIVER: postgres
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-platform-podcasts}
      S3_REGION: ${S3_REGION:-us-east-1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      RUN_DB_MIGRATIONS: "true"
    ports:
      - "8000:8000"
      - "9009:9000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./configs:/app/configs
      - ./.platform:/app/.platform
      - ./scripts:/app/scripts
    networks:
      - podcast_network

volumes:
  postgres_data:
  minio_data:

networks:
  podcast_network:
    driver: bridge
