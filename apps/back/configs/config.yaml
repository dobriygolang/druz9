server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: postgres
    source: "postgres://postgres:postgres@127.0.0.1:5432/podcast?sslmode=disable"
external:
  telegram:
    bot_token: ""
    webhook_url: ""
  s3:
    endpoint: "http://127.0.0.1:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "podcasts"
    region: "us-east-1"
