name: druz9

services:
  frontend:
    build:
      context: ../front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${APP_HOST}
        VITE_SSE_URL: https://${APP_HOST}
        VITE_WS_URL: https://${APP_HOST}
        VITE_ARENA_REQUIRE_AUTH: ${ARENA_REQUIRE_AUTH:-false}
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY:-}
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    volumes:
      - minio_data:/data
    secrets:
      - minio_root_user
      - minio_root_password
    networks:
      - app_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    entrypoint:
      - /bin/sh
      - -c
      - export DATA_SOURCE_NAME="postgresql://${POSTGRES_USER}:$$(cat /run/secrets/postgres_password)@postgres:5432/${POSTGRES_DB}?sslmode=disable" && /bin/postgres_exporter
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:9187:9187"
    secrets:
      - postgres_password
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ../api/scripts/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../api/scripts/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-remote-write-receiver'
    depends_on:
      - postgres-exporter
      - minio
      - backend
      - node-exporter
      - alertmanager
    networks:
      - app_network

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ../api/scripts/prometheus/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
    command:
      - /bin/sh
      - -ec
      - |
        BOT_TOKEN="$$(cat /run/secrets/telegram_bot_token)";
        CHAT_ID="$$(cat /run/secrets/telegram_alert_chat_id)";
        sed \
          -e "s|__BOT_TOKEN__|$$BOT_TOKEN|g" \
          -e "s|__CHAT_ID__|$$CHAT_ID|g" \
          /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml;
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    secrets:
      - telegram_bot_token
      - telegram_alert_chat_id
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${APP_HOST}
      GF_SERVER_ROOT_URL: https://${APP_HOST}/metrics/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_PROTOCOL: http
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ../api/scripts/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../api/scripts/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app_network

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      S3_ACCESS_KEY=$$(cat $$S3_ACCESS_KEY_FILE) &&
      S3_SECRET_KEY=$$(cat $$S3_SECRET_KEY_FILE) &&
      mc alias set local "$$S3_ENDPOINT" "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" &&
      mc mb --ignore-existing local/$$S3_BUCKET
      "
    secrets:
      - s3_access_key
      - s3_secret_key
    networks:
      - app_network

  seed:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: api-runtime
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      CONFIG_PROFILE: prod
      RTC_VALUES_PATH: /app/.platform/values_prod.yaml
      DATABASE_URL_FILE: /run/secrets/database_url
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
    volumes:
      - ../api/.platform/values_prod.yaml:/app/.platform/values_prod.yaml:ro
    command: ["/app/bin/seed", "-only", "all"]
    secrets:
      - database_url
      - s3_access_key
      - s3_secret_key
    networks:
      - app_network

  sandbox-runner:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: sandbox-runner-runtime
    image: druz9-sandbox-runner:prod
    restart: unless-stopped
    depends_on:
      sandbox-exec-image:
        condition: service_completed_successfully
    environment:
      SANDBOX_RUNNER_BIND_ADDR: ":8098"
      SANDBOX_EXEC_IMAGE: druz9-sandbox-exec:prod
      SANDBOX_RUNNER_TIMEOUT: 25s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8098/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app_network

  sandbox-exec-image:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: sandbox-exec-runtime
    image: druz9-sandbox-exec:prod
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["exit 0"]
    networks:
      - app_network

  backend:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: api-runtime
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      sandbox-runner:
        condition: service_healthy
      notification-service:
        condition: service_started
    environment:
      CONFIG_PROFILE: prod
      RTC_VALUES_PATH: /app/.platform/values_prod.yaml
      RUN_DB_MIGRATIONS: "true"
      DATABASE_URL_FILE: /run/secrets/database_url
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_NAME}
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      AI_REVIEW_API_KEY_FILE: /run/secrets/ai_review_api_key
      YANDEX_OAUTH_CLIENT_SECRET: ${YANDEX_OAUTH_CLIENT_SECRET}
      SANDBOX_MODE: remote
      SANDBOX_RUNNER_URL: http://sandbox-runner:8098
      SANDBOX_RUNNER_TIMEOUT: 25s
      NOTIFICATION_SERVICE_ADDR: notification-service:9000
    volumes:
      - ../api/.platform/values_prod.yaml:/app/.platform/values_prod.yaml:ro
    command: ["/app/bin/api"]
    ports:
      - "127.0.0.1:8080:8080"
    secrets:
      - database_url
      - telegram_bot_token
      - ai_review_api_key
      - s3_access_key
      - s3_secret_key
      - postgres_password
      - minio_root_user
      - minio_root_password
    networks:
      - app_network

  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUN_DB_MIGRATIONS: "true"
      DATABASE_URL_FILE: /run/secrets/database_url
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      RTC_VALUES_PATH: /app/.platform/values.yaml
      API_GRPC_ADDR: backend:9000
      GRPC_ADDR: ":9000"
      HTTP_ADDR: ":8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    secrets:
      - database_url
      - telegram_bot_token
    volumes:
      - ../notification-service/.platform/values.yaml:/app/.platform/values.yaml:ro
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  grafana_data:
  prometheus_data:

secrets:
  database_url:
    file: ./runtime/secrets/prod/database_url
  telegram_bot_token:
    file: ./runtime/secrets/prod/telegram_bot_token
  telegram_alert_chat_id:
    file: ./runtime/secrets/prod/telegram_alert_chat_id
  ai_review_api_key:
    file: ./runtime/secrets/prod/ai_review_api_key
  s3_access_key:
    file: ./runtime/secrets/prod/s3_access_key
  s3_secret_key:
    file: ./runtime/secrets/prod/s3_secret_key
  postgres_password:
    file: ./runtime/secrets/prod/postgres_password
  minio_root_user:
    file: ./runtime/secrets/prod/minio_root_user
  minio_root_password:
    file: ./runtime/secrets/prod/minio_root_password
  yandex_oauth_client_secret:
    file: ./runtime/secrets/prod/yandex_oauth_client_secret
