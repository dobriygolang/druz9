name: druz9

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_EMAIL: ${APP_EMAIL}
      APP_HOST: ${APP_HOST}
      API_HOST: ${API_HOST}
      S3_HOST: ${S3_HOST}
      MINIO_CONSOLE_HOST: ${MINIO_CONSOLE_HOST}
      MINIO_CONSOLE_BASIC_AUTH: ${MINIO_CONSOLE_BASIC_AUTH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - minio
    networks:
      - app_network

  frontend:
    build:
      context: ../front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${API_HOST}
        VITE_SSE_URL: https://${API_HOST}
        VITE_WS_URL: https://${API_HOST}
        VITE_TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME}
        VITE_ARENA_REQUIRE_AUTH: ${ARENA_REQUIRE_AUTH:-false}
    restart: unless-stopped
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    volumes:
      - minio_data:/data
    secrets:
      - minio_root_user
      - minio_root_password
    networks:
      - app_network

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      S3_ACCESS_KEY=$$(cat $$S3_ACCESS_KEY_FILE) &&
      S3_SECRET_KEY=$$(cat $$S3_SECRET_KEY_FILE) &&
      mc alias set local $$S3_ENDPOINT $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET
      "
    secrets:
      - s3_access_key
      - s3_secret_key
    networks:
      - app_network

  backend:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CONFIG_PROFILE: prod
      RTC_VALUES_PATH: /app/.platform/values_prod.yaml
      RUN_DB_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./runtime/values_prod.yaml:/app/.platform/values_prod.yaml:ro
    secrets:
      - database_url
      - telegram_bot_token
      - s3_access_key
      - s3_secret_key
      - postgres_password
      - minio_root_user
      - minio_root_password
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:

secrets:
  database_url:
    file: ./runtime/secrets/prod/database_url
  telegram_bot_token:
    file: ./runtime/secrets/prod/telegram_bot_token
  s3_access_key:
    file: ./runtime/secrets/prod/s3_access_key
  s3_secret_key:
    file: ./runtime/secrets/prod/s3_secret_key
  postgres_password:
    file: ./runtime/secrets/prod/postgres_password
  minio_root_user:
    file: ./runtime/secrets/prod/minio_root_user
  minio_root_password:
    file: ./runtime/secrets/prod/minio_root_password
