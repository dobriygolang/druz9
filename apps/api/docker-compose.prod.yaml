services:
  postgres:
    image: postgres:15-alpine
    container_name: podcast-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - /srv/postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - podcast_network
    secrets:
      - postgres_password

  minio:
    image: minio/minio:latest
    container_name: podcast-minio-prod
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "9001:9001"
    entrypoint: ["sh", "/usr/local/bin/minio-entrypoint.sh"]
    command: ["server", "/data", "--console-address", ":9001"]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - podcast_network
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - /srv/minio_data:/data
      - ./scripts/minio-entrypoint.sh:/usr/local/bin/minio-entrypoint.sh:ro
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_BUCKET: ${S3_BUCKET:-platform-podcasts}
    entrypoint: >
      /bin/sh -c "
      S3_ACCESS_KEY=$$(cat $$S3_ACCESS_KEY_FILE) &&
      S3_SECRET_KEY=$$(cat $$S3_SECRET_KEY_FILE) &&
      mc alias set local $$S3_ENDPOINT $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET
      "
    networks:
      - podcast_network
    secrets:
      - s3_access_key
      - s3_secret_key

  backend:
    image: api-service:latest
    container_name: api-backend-prod
    environment:
      APP_ENV: production
      APP_CONFIG_PATH: /app/configs/config.yaml
      DATABASE_URL_FILE: /run/secrets/database_url
      DB_DRIVER: postgres
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_BUCKET: ${S3_BUCKET:-platform-podcasts}
      S3_REGION: ${S3_REGION:-us-east-1}
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      RUN_DB_MIGRATIONS: "true"
    ports:
      - "8000:8000"
      - "9009:9000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - podcast_network
    secrets:
      - database_url
      - s3_access_key
      - s3_secret_key
      - telegram_bot_token
    volumes:
      - ./.platform:/app/.platform

networks:
  podcast_network:
    driver: bridge

secrets:
  database_url:
    file: ${SECRETS_DIR:-./.secrets/prod}/database_url
  postgres_password:
    file: ${SECRETS_DIR:-./.secrets/prod}/postgres_password
  minio_root_user:
    file: ${SECRETS_DIR:-./.secrets/prod}/minio_root_user
  minio_root_password:
    file: ${SECRETS_DIR:-./.secrets/prod}/minio_root_password
  s3_access_key:
    file: ${SECRETS_DIR:-./.secrets/prod}/s3_access_key
  s3_secret_key:
    file: ${SECRETS_DIR:-./.secrets/prod}/s3_secret_key
  telegram_bot_token:
    file: ${SECRETS_DIR:-./.secrets/prod}/telegram_bot_token
