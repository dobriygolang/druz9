run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - depguard
    - errcheck
    - goconst
    - goimports
    - gosec
    - govet
    - ineffassign
    - gosimple
    - staticcheck
    - revive
    - typecheck
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning

  # Архитектурные правила для контрибьюторов.
  # Каждый internal/domain/X не может импортировать internal/domain/Y — общайтесь через контракты/события/интерфейсы.
  # Аналогично для internal/data/X → internal/data/Y (исключение: internal/data/codetasks — shared read-only catalog).
  depguard:
    rules:
      achievement-domain:
        list-mode: lax
        files: ["**/internal/domain/achievement/**"]
        deny: &deny-domains-except-achievement
          - pkg: "api/internal/domain/activity"
          - pkg: "api/internal/domain/admin"
          - pkg: "api/internal/domain/arena"
          - pkg: "api/internal/domain/challenge"
          - pkg: "api/internal/domain/circle"
          - pkg: "api/internal/domain/codeeditor"
          - pkg: "api/internal/domain/event"
          - pkg: "api/internal/domain/geo"
          - pkg: "api/internal/domain/interviewprep"
          - pkg: "api/internal/domain/mission"
          - pkg: "api/internal/domain/podcast"
          - pkg: "api/internal/domain/profile"
          - pkg: "api/internal/domain/referral"

      activity-domain:
        list-mode: lax
        files: ["**/internal/domain/activity/**"]
        deny:
          - pkg: "api/internal/domain/achievement"
          - pkg: "api/internal/domain/admin"
          - pkg: "api/internal/domain/arena"
          - pkg: "api/internal/domain/challenge"
          - pkg: "api/internal/domain/circle"
          - pkg: "api/internal/domain/codeeditor"
          - pkg: "api/internal/domain/event"
          - pkg: "api/internal/domain/geo"
          - pkg: "api/internal/domain/interviewprep"
          - pkg: "api/internal/domain/mission"
          - pkg: "api/internal/domain/podcast"
          - pkg: "api/internal/domain/profile"
          - pkg: "api/internal/domain/referral"

      admin-domain:
        list-mode: lax
        files: ["**/internal/domain/admin/**"]
        deny:
          - pkg: "api/internal/domain/achievement"
          - pkg: "api/internal/domain/activity"
          - pkg: "api/internal/domain/arena"
          - pkg: "api/internal/domain/challenge"
          - pkg: "api/internal/domain/circle"
          - pkg: "api/internal/domain/codeeditor"
          - pkg: "api/internal/domain/event"
          - pkg: "api/internal/domain/geo"
          - pkg: "api/internal/domain/interviewprep"
          - pkg: "api/internal/domain/mission"
          - pkg: "api/internal/domain/podcast"
          - pkg: "api/internal/domain/profile"
          - pkg: "api/internal/domain/referral"

      arena-domain:
        list-mode: lax
        files: ["**/internal/domain/arena/**"]
        deny:
          - pkg: "api/internal/domain/achievement"
          - pkg: "api/internal/domain/activity"
          - pkg: "api/internal/domain/admin"
          - pkg: "api/internal/domain/challenge"
          - pkg: "api/internal/domain/circle"
          - pkg: "api/internal/domain/codeeditor"
          - pkg: "api/internal/domain/event"
          - pkg: "api/internal/domain/geo"
          - pkg: "api/internal/domain/interviewprep"
          - pkg: "api/internal/domain/mission"
          - pkg: "api/internal/domain/podcast"
          - pkg: "api/internal/domain/profile"
