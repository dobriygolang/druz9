run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - goconst
    - goimports
    - gosec
    - govet
    - ineffassign
    - gosimple
    - staticcheck
    - revive
    - typecheck
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
