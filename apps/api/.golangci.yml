issues:
  exclude-rules:
    - path: "internal/data/scene/"
      linters:
        - all
    - path: "internal/api/inbox/"
      linters:
        - typecheck
    - path: "pkg/api/.*\\.pb\\.go"
      linters:
        - all
    - path: "pkg/adapter/.*\\.pb\\.go"
      linters:
        - all
    - path: "third_party/"
      linters:
        - all
    - path: "scripts/"
      linters:
        - forbidigo
        - gosec
    - path: "(.+)_test\\.go"
      linters:
        - err113
        - goconst
        - musttag
        - wrapcheck
