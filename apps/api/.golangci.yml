          - pkg: "api/internal/domain/podcast"
          - pkg: "api/internal/domain/profile"

      # realtime/arena не может импортировать realtime/codeeditor и наоборот.
      realtime-arena:
        list-mode: lax
        files: ["**/internal/realtime/arena/**"]
        deny:
          - pkg: "api/internal/realtime/codeeditor"

      realtime-codeeditor:
        list-mode: lax
        files: ["**/internal/realtime/codeeditor/**"]
        deny:
          - pkg: "api/internal/realtime/arena"

      # data/X не может импортировать data/Y (кроме codetasks — shared read-only каталог задач).
      data-isolation:
        list-mode: lax
        files:
          - "**/internal/data/arena/**"
          - "**/internal/data/challenge/**"
          - "**/internal/data/circle/**"
          - "**/internal/data/code_editor/**"
          - "**/internal/data/event/**"
          - "**/internal/data/geo/**"
          - "**/internal/data/interviewprep/**"
          - "**/internal/data/mission/**"
          - "**/internal/data/podcast/**"
          - "**/internal/data/profile/**"
          - "**/internal/data/referral/**"
          - "**/internal/data/solution_review/**"
        deny:
          - pkg: "api/internal/data/arena"
          - pkg: "api/internal/data/challenge"
          - pkg: "api/internal/data/circle"
          - pkg: "api/internal/data/code_editor"
          - pkg: "api/internal/data/event"
          - pkg: "api/internal/data/geo"
          - pkg: "api/internal/data/interviewprep"
          - pkg: "api/internal/data/mission"
          - pkg: "api/internal/data/podcast"
          - pkg: "api/internal/data/profile"
          - pkg: "api/internal/data/referral"
          - pkg: "api/internal/data/solution_review"
