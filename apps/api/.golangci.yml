run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - depguard
    - dogsled
    - dupword
    - durationcheck
    - err113
    - errchkjson
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - gci
    - goconst
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gomoddirectives
    - gosec
    - govet
    - grouper
    - iface
    - ineffassign
    - importas
    - inamedparam
    - interfacebloat
    - intrange
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - paralleltest
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - gosimple
    - spancheck
    - sqlclosecheck
    - staticcheck
    - revive
    - testifylint
    - testableexamples
    - thelper
    - tparallel
    - typecheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck

linters-settings:
  cyclop:
    max-complexity: 18
    package-average: 12

  exhaustive:
    default-signifies-exhaustive: true

  forbidigo:
    forbid:
      - p: ^fmt\.Print.*$
        pkg: ^fmt$
        msg: use structured logger instead of fmt.Print*
      - p: ^log\.Print.*$
        pkg: ^log$
        msg: use structured logger instead of log.Print*
      - p: ^log\.Fatal.*$
        pkg: ^log$
        msg: return an error and let the application boundary decide how to exit

  gci:
    sections:
      - standard
      - default
      - prefix(api)
    custom-order: true

  gocognit:
    min-complexity: 25

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam
      - ifElseChain
      - unnamedResult

  gocyclo:
    min-complexity: 22

  gosec:
    excludes:
      - G115

  interfacebloat:
    max: 12

  nakedret:
    max-func-lines: 0

  nestif:
    min-complexity: 5

  nolintlint:
    require-explanation: true
    require-specific: true

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  testifylint:
    enable-all: true

  revive:
    rules:
      - name: exported
        severity: warning

  # Архитектурные правила для контрибьюторов.
