groups:
  - name: druz9_alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend недоступен"
          description: "Prometheus не может собрать метрики с backend больше 1 минуты."

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter недоступен"
          description: "Prometheus не может собрать метрики с postgres-exporter больше 2 минут."

      - alert: MinioDown
        expr: up{job="minio"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MinIO недоступен"
          description: "Prometheus не может собрать метрики с MinIO больше 2 минут."

      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter недоступен"
          description: "Нет host-метрик больше 5 минут."

      - alert: HighHTTPErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_total{code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_total[5m])), 0.1)
          ) > 0.05
          and
          sum(rate(http_server_requests_seconds_total[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокая доля HTTP 5xx"
          description: "Больше 5% HTTP-запросов завершаются 5xx дольше 5 минут."

      - alert: CriticalHTTPErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_total{code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_total[5m])), 0.1)
          ) > 0.15
          and
          sum(rate(http_server_requests_seconds_total[5m])) > 0.2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Критическая доля HTTP 5xx"
          description: "Больше 15% HTTP-запросов завершаются 5xx."

      - alert: HighGRPCErrorRate
        expr: |
          (
            sum(rate(grpc_server_handled_total{grpc_code=~"Unknown|Internal|Aborted|DataLoss|Unavailable"}[5m]))
            /
            clamp_min(sum(rate(grpc_server_handled_total[5m])), 0.1)
          ) > 0.05
          and
          sum(rate(grpc_server_handled_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокая доля ошибок gRPC"
          description: "Больше 5% gRPC-запросов завершаются ошибкой."

      - alert: HighHTTPLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 1.5
          and
          sum(rate(http_server_requests_seconds_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Высокая HTTP latency"
          description: "p95 HTTP latency выше 1.5s дольше 10 минут."

      - alert: CriticalHTTPLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 3
          and
          sum(rate(http_server_requests_seconds_total[5m])) > 0.2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Критическая HTTP latency"
          description: "p95 HTTP latency выше 3s."

      - alert: HighGRPCLatency
        expr: |
          histogram_quantile(0.95, sum(rate(grpc_server_handling_seconds_bucket[5m])) by (le)) > 1
          and
          sum(rate(grpc_server_handled_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокая gRPC latency"
          description: "p95 gRPC latency выше 1 секунды."

      - alert: HostHighCPU
        expr: |
          100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{job="node", mode="idle"}[5m]))) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Высокая загрузка CPU"
          description: "CPU на сервере выше 85% больше 10 минут."

      - alert: HostCriticalCPU
        expr: |
          100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{job="node", mode="idle"}[5m]))) > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Критическая загрузка CPU"
          description: "CPU на сервере выше 95% больше 5 минут."

      - alert: HostHighMemory
        expr: |
          100 * (1 - (node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"})) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокое потребление RAM"
          description: "Использование RAM на сервере выше 90%."

      - alert: HostCriticalMemory
        expr: |
          100 * (1 - (node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"})) > 96
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Критическое потребление RAM"
          description: "Использование RAM на сервере выше 96%."

      - alert: HostDiskLow
        expr: |
          100 * (
            node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
          ) < 15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Мало свободного места на диске"
          description: "На корневом диске осталось меньше 15% свободного места."

      - alert: HostDiskCritical
        expr: |
          100 * (
            node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
          ) < 8
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Критически мало места на диске"
          description: "На корневом диске осталось меньше 8% свободного места."

      - alert: HighGoroutineCount
        expr: go_goroutines{job="backend"} > 1500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Слишком много goroutines"
          description: "На backend больше 1500 goroutines дольше 10 минут."

      - alert: CriticalGoroutineCount
        expr: go_goroutines{job="backend"} > 3000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Критически много goroutines"
          description: "На backend больше 3000 goroutines."

      - alert: HighGCPause
        expr: rate(go_gc_duration_seconds_sum[5m]) / rate(go_gc_duration_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Долгие GC pause"
          description: "Средняя GC pause на backend выше 500ms."

      - alert: BusinessActiveRoomsSpike
        expr: business_active_rooms > 25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Слишком много активных комнат"
          description: "Количество активных code rooms выше 25 дольше 10 минут."

      - alert: BusinessActiveMatchesSpike
        expr: business_active_matches > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Слишком много активных матчей"
          description: "Количество активных arena matches выше 20."
