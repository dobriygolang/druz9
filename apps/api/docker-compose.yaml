services:
  postgres:
    image: postgres:15-alpine
    container_name: api-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-api}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - api_network

  minio:
    image: minio/minio:latest
    container_name: api-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - api_network

  minio-init:
    image: minio/mc:latest
    container_name: api-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin}
      S3_BUCKET: ${S3_BUCKET:-api-local}
    entrypoint: >
      /bin/sh -c "
      mc alias set local $$S3_ENDPOINT $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc admin user add local admin adminadmin || true &&
      mc admin policy attach local consoleAdmin --user admin || true
      "
    networks:
      - api_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: api-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-api}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"
    networks:
      - api_network

  prometheus:
    image: prom/prometheus:latest
    container_name: api-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./scripts/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./scripts/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-remote-write-receiver'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - alertmanager
    networks:
      - api_network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: api-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./scripts/prometheus/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
    command:
      - /bin/sh
      - -ec
      - |
        BOT_TOKEN="$${ALERT_TELEGRAM_BOT_TOKEN:-disabled}";
        CHAT_ID="$${ALERT_TELEGRAM_CHAT_ID:-0}";
        sed \
          -e "s|__BOT_TOKEN__|$$BOT_TOKEN|g" \
          -e "s|__CHAT_ID__|$$CHAT_ID|g" \
          /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml;
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    networks:
      - api_network

  grafana:
    image: grafana/grafana:latest
    container_name: api-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./scripts/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./scripts/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - postgres-exporter
      - prometheus
    networks:
      - api_network

  seed:                                                                                                                                       
    build:                                        
      context: .                                                                                                                              
      dockerfile: Dockerfile                                                             
    restart: "no"                                                                                                                             
    depends_on:                                                                          
      postgres:                                                                                                                               
        condition: service_healthy                                                                                                            
    environment:
      CONFIG_PROFILE: local
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-api}
    command: ["/app/bin/seed", "-only", "all"]                                                                                                
    networks:
      - api_network

  sandbox-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: sandbox-runner-runtime
    image: druz9-sandbox-runner:local
    container_name: api-sandbox-runner
    restart: unless-stopped
    depends_on:
      sandbox-exec-image:
        condition: service_completed_successfully
    environment:
      SANDBOX_RUNNER_BIND_ADDR: ":8098"
      SANDBOX_EXEC_IMAGE: druz9-sandbox-exec:local
      SANDBOX_RUNNER_TIMEOUT: 25s
    ports:
      - "8098:8098"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8098/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_network

  sandbox-exec-image:
    build:
      context: .
      dockerfile: Dockerfile
      target: sandbox-exec-runtime
    image: druz9-sandbox-exec:local
    container_name: api-sandbox-exec-image
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["exit 0"]
    networks:
      - api_network

  # backend intentionally omitted from local compose;
  # run it separately via `make run`.
  #
  # This compose file is for local infra only: postgres + s3.

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  api_network:
    driver: bridge
