components:
    schemas:
        admin.v1.AIMentor:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                provider:
                    type: string
                modelId:
                    type: string
                tier:
                    type: integer
                    format: int32
                promptTemplate:
                    type: string
                isActive:
                    type: boolean
        admin.v1.AdminStatusResponse:
            type: object
            properties:
                status:
                    type: integer
                    format: enum
        admin.v1.ConfigItem:
            type: object
            properties:
                key:
                    type: string
                value:
                    type: string
                type:
                    type: string
                writable:
                    type: boolean
                usage:
                    type: string
                group:
                    type: string
        admin.v1.CreateAIMentorRequest:
            type: object
            properties:
                name:
                    type: string
                provider:
                    type: string
                modelId:
                    type: string
                tier:
                    type: integer
                    format: int32
                promptTemplate:
                    type: string
                isActive:
                    type: boolean
        admin.v1.DeleteAIMentorResponse:
            type: object
            properties:
                ok:
                    type: boolean
        admin.v1.GetConfigResponse:
            type: object
            properties:
                key:
                    type: string
                value:
                    type: string
                type:
                    type: string
                writable:
                    type: boolean
                usage:
                    type: string
                group:
                    type: string
        admin.v1.GetRuntimeConfigResponse:
            type: object
            properties:
                appRequireAuth:
                    type: boolean
                arenaRequireAuth:
                    type: boolean
        admin.v1.GrantCurrencyRequest:
            type: object
            properties:
                userId:
                    type: string
                currency:
                    type: string
                amount:
                    type: string
                reason:
                    type: string
                    description: |-
                        Free-form note recorded in the ledger so audits can trace why a
                         grant happened (event, support ticket id, etc.).
            description: |-
                Currency strings the wallet domain understands ("gold", "gems", "shards").
                 Kept as a string instead of an enum so we can introduce new currencies
                 (souls, etc.) without touching this proto.
        admin.v1.ListAIMentorsResponse:
            type: object
            properties:
                mentors:
                    type: array
                    items:
                        $ref: '#/components/schemas/admin.v1.AIMentor'
        admin.v1.ListConfigResponse:
            type: object
            properties:
                configs:
                    type: array
                    items:
                        $ref: '#/components/schemas/admin.v1.ConfigItem'
        admin.v1.UpdateAIMentorRequest:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                provider:
                    type: string
                modelId:
                    type: string
                tier:
                    type: integer
                    format: int32
                promptTemplate:
                    type: string
                isActive:
                    type: boolean
        admin.v1.UpdateConfigRequest:
            type: object
            properties:
                key:
                    type: string
                value:
                    type: string
        admin.v1.UpdateConfigResponse:
            type: object
            properties:
                key:
                    type: string
                value:
                    type: string
                success:
                    type: boolean
        admin.v1.UpdateUserAdminRequest:
            type: object
            properties:
                userId:
                    type: string
                isAdmin:
                    type: boolean
        admin.v1.UpdateUserTrustRequest:
            type: object
            properties:
                userId:
                    type: string
                isTrusted:
                    type: boolean
        admin.v1.UpsertMentorSecretRequest:
            type: object
            properties:
                mentorId:
                    type: string
                apiKey:
