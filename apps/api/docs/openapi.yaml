tags:
    - name: AdminService
    - name: ArenaService
    - name: ChallengeService
      description: |-
        ChallengeService hosts the read-only "mini-game" modes in druz9:
         blind review, personal speed-run records, weekly boss info. Write
         paths (SubmitDailyReview, SubmitWeeklyBoss, RecordSpeedRun,
         GetDailyLeaderboard) existed historically but were never wired on
         the frontend and have been removed — add them back only when a page
         actually consumes them.
    - name: CodeEditorService
    - name: DuelReplayService
      description: |-
        DuelReplayService stores and serves time-series replay data for arena
         duels and friend challenges. Events are append-only keystroke/run/submit
         entries timestamped as millisecond offsets from the match start; the
         client replay viewer scrubs through them on a timeline.
    - name: EventService
    - name: FriendChallengeService
      description: |-
        FriendChallengeService handles asynchronous 1v1 task duels between friends.
         Unlike live arena matches, both players solve the same task on their own
         schedule within a 48-hour window; the faster-and-more-correct submission
         wins.
    - name: GeoService
    - name: GuildService
    - name: HubService
    - name: InboxService
      description: |-
        InboxService delivers messages to the authenticated user. Each user sees
         their own thread list: mentor feedback, guild notices, system events,
         duel chat, friend-challenge conversations. Threads are per-user and own
         their message list; cross-user threads are modeled by mirroring messages.
    - name: InterviewPrepService
    - name: MissionService
    - name: NotificationSettingsService
    - name: PodcastService
    - name: ProfileService
    - name: ReferralService
    - name: SeasonPassService
      description: |-
        SeasonPassService exposes the current season's tiered-reward track. Each
         season has a fixed tier ladder (~40 tiers); free rewards are claimable by
         every player as they accumulate XP, premium rewards require buying the
         season pass first.
    - name: ShopService
      description: |-
        ShopService is the Tavern: a catalog of cosmetics/decor/pets plus a
         per-user inventory of what's been purchased. Prices are paid in gold or
         gems; both balances live on the profile (not yet debited from this
         service — Debit* is a follow-up when the profile wallet API is ready).
    - name: SocialService
      description: |-
        SocialService manages the friends graph: sending/accepting requests,
         listing current friends with their online presence, and removing
         friendships. Chat between friends happens in the inbox service; this
         service is purely about the relationship edges.
    - name: StreakService
      description: |-
        StreakService manages daily-activity streak state and the "Streak Shield"
         inventory item users can spend to restore a broken streak. The raw streak
         count itself is derived from existing activity tables (mission/practice)
         and exposed via profile progress; this service owns the protection layer.
    - name: TrainingService
