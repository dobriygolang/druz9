                            schema:
                                $ref: '#/components/schemas/training.v1.GetSkillTreeResponse'
    /api/v1/training/tasks/{moduleId}:
        get:
            tags:
                - TrainingService
            description: |-
                GetTask and EvaluateTaskSolution are implemented with full sandbox
                 execution, season-pass XP awarding and AI review. They are not yet
                 wired into the primary frontend flow (the training page only renders
                 the skill tree), but they are production-ready and kept here for the
                 upcoming in-tree task-solving feature.
            operationId: TrainingService_GetTask
            parameters:
                - name: moduleId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/training.v1.GetTaskResponse'
