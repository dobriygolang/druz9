    /api/v1/arena/queue/enqueue:
        post:
            tags:
                - ArenaService
            description: |-
                EnqueueForMatch puts the caller into the matchmaking queue for `mode`.
                 If another player is already waiting, a match is created immediately
                 and both players receive status=MATCHED on the next GetQueueStatus
                 call. Queue state is in-memory per backend instance — fine for a
                 single-replica deploy, needs Redis for multi-replica.
            operationId: ArenaService_EnqueueForMatch
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/arena.v1.EnqueueForMatchRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/arena.v1.EnqueueForMatchResponse'
