                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/arena.v1.ArenaStatusResponse'
    /api/v1/arena/queue/status/{queueId}:
        get:
            tags:
                - ArenaService
            description: |-
                GetQueueStatus is polled by the client (typically every 2s). Status
                 goes WAITING → MATCHED (with match_id) or WAITING → TIMEOUT after 30s.
                 On TIMEOUT the client offers the solo-timed fallback UI.
            operationId: ArenaService_GetQueueStatus
            parameters:
                - name: queueId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/arena.v1.GetQueueStatusResponse'
