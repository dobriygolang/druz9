    /api/v1/streak:
        get:
            tags:
                - StreakService
            description: |-
                GetStreak returns current streak, longest streak, shields owned,
                 whether the streak is broken today, and whether a shield can restore it.
            operationId: StreakService_GetStreak
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/streak.v1.GetStreakResponse'
    /api/v1/streak/shield/purchase:
        post:
            tags:
                - StreakService
            description: |-
                PurchaseShield buys N shields for gold. N=1 by default; max 5 per call
                 enforced server-side.
            operationId: StreakService_PurchaseShield
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/streak.v1.PurchaseShieldRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/streak.v1.PurchaseShieldResponse'
    /api/v1/streak/shield/use:
        post:
            tags:
                - StreakService
            description: |-
                UseShield consumes one shield to restore a broken streak. Idempotent:
                 calling when streak is intact returns an error.
            operationId: StreakService_UseShield
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/streak.v1.UseShieldRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/streak.v1.UseShieldResponse'
