syntax = "proto3";

package profile.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "api/pkg/api/profile/v1;v1";

service ProfileService {
  rpc CreateTelegramAuthChallenge(CreateTelegramAuthChallengeRequest) returns (CreateTelegramAuthChallengeResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/telegram/challenge"
      body: "*"
    };
  }

  rpc ConfirmTelegramAuth(ConfirmTelegramAuthRequest) returns (ConfirmTelegramAuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/telegram/confirm"
      body: "*"
    };
  }

  rpc TelegramAuth(TelegramAuthRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/telegram"
      body: "*"
    };
  }

  rpc CompleteRegistration(CompleteRegistrationRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/complete-registration"
      body: "*"
    };
  }

  rpc GetProfile(GetProfileRequest) returns (ProfileResponse) {
    option (google.api.http) = { get: "/api/v1/profile" };
  }

  rpc GetProfileByID(GetProfileByIDRequest) returns (ProfileResponse) {
    option (google.api.http) = { get: "/api/v1/profile/{user_id}" };
  }

  rpc UpdateLocation(UpdateLocationRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/location"
      body: "*"
    };
  }

  rpc UpdateProfile(UpdateProfileRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/update"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/logout"
      body: "*"
    };
  }

  rpc BindTelegram(BindTelegramRequest) returns (BindTelegramResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/bind-telegram"
      body: "*"
    };
  }

  rpc GetPhotoUploadURL(GetPhotoUploadURLRequest) returns (GetPhotoUploadURLResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/photo/upload-url"
      body: "*"
    };
  }

  rpc CompletePhotoUpload(CompletePhotoUploadRequest) returns (CompletePhotoUploadResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/photo/complete"
      body: "*"
    };
  }

  rpc LoginWithPassword(LoginWithPasswordRequest) returns (LoginWithPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/login-password"
      body: "*"
    };
  }

  rpc RegisterWithPassword(RegisterWithPasswordRequest) returns (RegisterWithPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/auth/register-password"
      body: "*"
    };
  }
}

message CreateTelegramAuthChallengeRequest {}

message CreateTelegramAuthChallengeResponse {
  string token = 1;
  string bot_start_url = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message ConfirmTelegramAuthRequest {
  string token = 1;
  string bot_token = 2;
  int64 telegram_id = 3;
  string first_name = 4;
  string last_name = 5;
  string username = 6;
  string photo_url = 7;
}

message ConfirmTelegramAuthResponse {
  string status = 1;
  string code = 2;
}

message TelegramAuthRequest {
  string token = 1;
  string code = 2;
}

message CompleteRegistrationRequest {
  string region = 2;
  string country = 3;
  string city = 4;
  double latitude = 5;
  double longitude = 6;
}

message GetProfileRequest {}

message GetProfileByIDRequest {
  string user_id = 1;
}

message UpdateLocationRequest {
  string region = 2;
  string country = 3;
  string city = 4;
  double latitude = 5;
  double longitude = 6;
}

message LogoutRequest {}

message UpdateProfileRequest {
  string current_workplace = 1;
}

// BindTelegram binds user's Telegram account
message BindTelegramRequest {
  string token = 1;
  string code = 2;
}

message BindTelegramResponse {
  string status = 1;
}

// GetPhotoUploadURL generates presigned URL for photo upload
message GetPhotoUploadURLRequest {
  string file_name = 1;
  string content_type = 2;
}

message GetPhotoUploadURLResponse {
  string upload_url = 1;
  string object_key = 2;
  int32 expires_in_seconds = 3;
}

// CompletePhotoUpload finalizes photo upload
message CompletePhotoUploadRequest {
  string object_key = 1;
}

message CompletePhotoUploadResponse {
  User user = 1;
  bool needs_profile_complete = 2;
}

// LoginWithPassword authenticates user with password
message LoginWithPasswordRequest {
  string login = 1;
  string password = 2;
}

message LoginWithPasswordResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

// RegisterWithPassword registers new user with password
message RegisterWithPasswordRequest {
  string login = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
}

message RegisterWithPasswordResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message ProfileResponse {
  User user = 1;
  bool needs_profile_complete = 2;
}

message LogoutResponse {
  string status = 1;
}

message User {
  string id = 1;
  int64 telegram_id = 2;
  string telegram_username = 3;
  string first_name = 4;
  string last_name = 5;
  string avatar_url = 6;
  string region = 7;
  google.protobuf.Timestamp created_at = 8;
  double latitude = 10;
  double longitude = 11;
  UserActivityStatus activity_status = 12;
  string current_workplace = 13;
  bool is_admin = 14;
  bool is_trusted = 16;
}

enum UserActivityStatus {
  USER_ACTIVITY_STATUS_UNSPECIFIED = 0;
  USER_ACTIVITY_STATUS_ONLINE = 1;
  USER_ACTIVITY_STATUS_RECENTLY_ACTIVE = 2;
  USER_ACTIVITY_STATUS_OFFLINE = 3;
}
