syntax = "proto3";

package code_editor.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

option go_package = "api/pkg/api/code_editor/v1;v1";

service CodeEditorService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms"
      body: "*"
    };
  }

  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse) {
    option (google.api.http) = {
      get: "/api/v1/code-editor/rooms/{room_id}"
    };
  }

  rpc JoinRoom(JoinRoomRequest) returns (JoinRoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms/{room_id}/join"
      body: "*"
    };
  }

  rpc JoinRoomByInviteCode(JoinRoomByInviteCodeRequest) returns (JoinRoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/join"
      body: "*"
    };
  }

  rpc LeaveRoom(LeaveRoomRequest) returns (StatusResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms/{room_id}/leave"
      body: "*"
    };
  }

  rpc CloseRoom(CloseRoomRequest) returns (StatusResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms/{room_id}/close"
      body: "*"
    };
  }

  rpc SubmitCode(SubmitCodeRequest) returns (SubmitCodeResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms/{room_id}/submit"
      body: "*"
    };
  }

  rpc SetReady(SetReadyRequest) returns (StatusResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms/{room_id}/ready"
      body: "*"
    };
  }

  rpc GetSubmissions(GetSubmissionsRequest) returns (GetSubmissionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/code-editor/rooms/{room_id}/submissions"
    };
  }

  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {
      get: "/api/v1/code-editor/tasks"
    };
  }

  rpc CreateTask(CreateTaskRequest) returns (TaskResponse) {
    option (google.api.http) = {
      post: "/api/admin/code-editor/tasks"
      body: "*"
    };
  }

  rpc UpdateTask(UpdateTaskRequest) returns (TaskResponse) {
    option (google.api.http) = {
      put: "/api/admin/code-editor/tasks/{task_id}"
      body: "*"
    };
  }

  rpc DeleteTask(DeleteTaskRequest) returns (StatusResponse) {
    option (google.api.http) = {
      delete: "/api/admin/code-editor/tasks/{task_id}"
    };
  }

  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse) {
    option (google.api.http) = {
      get: "/api/v1/code-editor/leaderboard"
    };
  }

  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse) {
    option (google.api.http) = {
      get: "/api/v1/code-editor/rooms"
    };
  }

  rpc AIReview(AIReviewRequest) returns (AIReviewResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/ai-review"
      body: "*"
    };
  }

  rpc GetDailyChallenge(GetDailyChallengeRequest) returns (GetDailyChallengeResponse) {
    option (google.api.http) = { get: "/api/v1/code-editor/daily" };
  }

  rpc StartRoom(StartRoomRequest) returns (StartRoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/code-editor/rooms/{room_id}/start"
      body: "*"
    };
  }

  rpc GetSolutionReview(GetSolutionReviewRequest) returns (SolutionReviewResponse) {
    option (google.api.http) = {
      get: "/api/v1/code-editor/reviews/{submission_id}"
    };
  }
}

// ── Enums ──────────────────────────────────────────────────────────────────

enum RoomMode {
  ROOM_MODE_UNSPECIFIED = 0;
  ROOM_MODE_ALL         = 1;  // collaborative mode
  ROOM_MODE_DUEL        = 2;  // duel mode (two users race)
}

enum RoomStatus {
  ROOM_STATUS_UNSPECIFIED = 0;
  ROOM_STATUS_WAITING     = 1;  // waiting for participants
  ROOM_STATUS_ACTIVE      = 2;  // room is active
  ROOM_STATUS_FINISHED    = 3;  // duel finished
}

enum TaskType {
  TASK_TYPE_UNSPECIFIED  = 0;
  TASK_TYPE_ALGORITHM    = 1;
  TASK_TYPE_DEBUGGING    = 2;
  TASK_TYPE_REFACTORING  = 3;
}

enum ReviewSourceType {
  REVIEW_SOURCE_TYPE_UNSPECIFIED = 0;
  REVIEW_SOURCE_TYPE_DAILY       = 1;
  REVIEW_SOURCE_TYPE_PRACTICE    = 2;
  REVIEW_SOURCE_TYPE_DUEL        = 3;
  REVIEW_SOURCE_TYPE_MOCK        = 4;
}

enum ReviewStatus {
  REVIEW_STATUS_UNSPECIFIED = 0;
  REVIEW_STATUS_PENDING     = 1;
  REVIEW_STATUS_READY       = 2;
  REVIEW_STATUS_FAILED      = 3;
}

enum AIVerdict {
  AI_VERDICT_UNSPECIFIED = 0;
  AI_VERDICT_OPTIMAL     = 1;
  AI_VERDICT_GOOD        = 2;
  AI_VERDICT_SUBOPTIMAL  = 3;
  AI_VERDICT_BRUTE_FORCE = 4;
}

// ── Request messages ───────────────────────────────────────────────────────

message CreateRoomRequest {
  RoomMode       mode       = 1;
  string         task       = 2;  // task description for duel
  string         name       = 3;  // creator display name
  string         topic      = 4;  // preferred duel topic
  common.v1.Difficulty difficulty = 5;  // preferred duel difficulty
  bool           is_private = 6;  // if true, only joinable via invite code
}

message GetRoomRequest {
  string room_id = 1;
}

message JoinRoomRequest {
  string room_id = 1;
  string name    = 2;  // guest display name
}

message JoinRoomByInviteCodeRequest {
  string invite_code = 1;
  string name        = 2;  // guest display name
}

message LeaveRoomRequest {
  string room_id = 1;
}

message CloseRoomRequest {
  string room_id = 1;
}

message SubmitCodeRequest {
  string                        room_id   = 1;
  string                        code      = 2;
  common.v1.ProgrammingLanguage language  = 3;
}

message SetReadyRequest {
  string room_id = 1;
  bool   ready   = 2;
}

message GetSubmissionsRequest {
  string room_id = 1;
}

message ListTasksRequest {
  string         topic            = 1;
  common.v1.Difficulty difficulty       = 2;
  bool           include_inactive = 3;
}

message CreateTaskRequest {
  TaskPayload task = 1;
}

message UpdateTaskRequest {
  string      task_id = 1;
  TaskPayload task    = 2;
}

message DeleteTaskRequest {
  string task_id = 1;
}

message GetLeaderboardRequest {
  int32 limit = 1;
}

message ListRoomsRequest {}

message ListRoomsResponse {
  repeated Room rooms = 1;
}

message AIReviewRequest {
  string language   = 1;
  string code       = 2;
  string task_title = 3;
  string statement  = 4;
}

message AIReviewResponse {
  common.v1.InterviewSolutionReview review = 1;
}

message GetDailyChallengeRequest {}

message GetDailyChallengeResponse {
  Task   task       = 1;
  string date       = 2;
  string expires_at = 3;
}

message StartRoomRequest {
  string room_id = 1;
}

message StartRoomResponse {
  common.v1.OperationStatus status      = 1;
  RoomStatus                room_status = 2;
}

// ── Response messages ──────────────────────────────────────────────────────

// StatusResponse is used for operations that only need to confirm success.
message StatusResponse {
  common.v1.OperationStatus status = 1;
}

message CreateRoomResponse {
  Room   room        = 1;
  string invite_code = 2;
}

message GetRoomResponse {
  Room room = 1;
}

message JoinRoomResponse {
  Room room = 1;
}

message SubmitCodeResponse {
  string output        = 1;
  string error         = 2;
  bool   is_correct    = 3;
  string submission_id = 4;
}

message GetSubmissionsResponse {
  repeated Submission submissions = 1;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message TaskResponse {
  Task task = 1;
}

message LeaderboardEntry {
  string user_id      = 1;
  string display_name = 2;
  int32  wins         = 3;
  int32  matches      = 4;
  double win_rate     = 5;
  int64  best_solve_ms = 6;
}

message GetLeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
}

// ── Domain entities ────────────────────────────────────────────────────────

message Room {
  string                    id            = 1;
  RoomMode                  mode          = 2;
  string                    code          = 3;
  RoomStatus                status        = 4;
  string                    invite_code   = 5;
  string                    task          = 6;  // task description (duel only)
  google.protobuf.Timestamp created_at    = 7;
  repeated Participant      participants  = 8;
  string                    task_id       = 9;
  int64                     code_revision = 10;
  string                    creator_id    = 11;
  bool                      is_private    = 12;
  common.v1.ProgrammingLanguage language  = 13;
}

message Participant {
  string                    user_id    = 1;
  string                    name       = 2;
  bool                      is_guest   = 3;
  bool                      is_ready   = 4;
  bool                      is_winner  = 5;
  google.protobuf.Timestamp joined_at  = 6;
  bool                      is_creator = 7;
}

message Submission {
  string                    id           = 1;
  string                    user_id      = 2;
  string                    guest_name   = 3;
  string                    code         = 4;
  string                    output       = 5;
  string                    error        = 6;
  google.protobuf.Timestamp submitted_at = 7;
  int64                     duration_ms  = 8;
  bool                      is_correct   = 9;
  int32                     passed_count = 10;
  int32                     total_count  = 11;
}

message TaskTestCase {
  string id              = 1;
  string input           = 2;
  string expected_output = 3;
  bool   is_public       = 4;
  int32  weight          = 5;
  int32  order           = 6;
}

message Task {
  string                    id                = 1;
  string                    title             = 2;
  string                    slug              = 3;
  string                    statement         = 4;
  common.v1.Difficulty            difficulty        = 5;
  repeated string           topics            = 6;
  string                    starter_code      = 7;
  common.v1.ProgrammingLanguage      language          = 8;
  bool                      is_active         = 9;
  repeated TaskTestCase     public_test_cases  = 10;
  repeated TaskTestCase     hidden_test_cases  = 11;
  google.protobuf.Timestamp created_at        = 12;
  google.protobuf.Timestamp updated_at        = 13;
  TaskType                  task_type         = 14;
  common.v1.ExecutionProfile         execution_profile = 15;  // was: string
  repeated string           fixture_files     = 16;
  repeated string           readable_paths    = 17;
  repeated string           writable_paths    = 18;
  repeated string           allowed_hosts     = 19;
  repeated int32            allowed_ports     = 20;
  repeated string           mock_endpoints    = 21;
  bool                      writable_temp_dir = 22;
  common.v1.RunnerMode               runner_mode       = 23;  // was: string
  int32                     duration_seconds  = 24;
}

// TaskPayload is used for create/update requests and mirrors Task minus server-managed fields.
message TaskPayload {
  string                title             = 1;
  string                slug              = 2;
  string                statement         = 3;
  common.v1.Difficulty        difficulty        = 4;
  repeated string       topics            = 5;
  string                starter_code      = 6;
  common.v1.ProgrammingLanguage  language          = 7;
  bool                  is_active         = 8;
  repeated TaskTestCase public_test_cases  = 9;
  repeated TaskTestCase hidden_test_cases  = 10;
  TaskType              task_type         = 11;
  common.v1.ExecutionProfile     execution_profile = 12;  // was: string
  repeated string       fixture_files     = 13;
  repeated string       readable_paths    = 14;
  repeated string       writable_paths    = 15;
  repeated string       allowed_hosts     = 16;
  repeated int32        allowed_ports     = 17;
  repeated string       mock_endpoints    = 18;
  bool                  writable_temp_dir = 19;
  common.v1.RunnerMode           runner_mode       = 20;  // was: string
  int32                 duration_seconds  = 21;
}

// ── Solution Review ──────────────────────────────────────────────────────

message GetSolutionReviewRequest {
  string submission_id = 1;
}

message SolutionReviewResponse {
  SolutionReview review = 1;
}

message SolutionReview {
  string id              = 1;
  string submission_id   = 2;
  ReviewSourceType source_type = 3;
  string task_id         = 4;

  // Level 1: instant feedback
  bool   is_correct      = 5;
  int32  attempt_number  = 6;
  int64  solve_time_ms   = 7;
  int64  median_time_ms  = 8;
  int32  passed_count    = 9;
  int32  total_count     = 10;

  // Level 2: AI review
  ReviewStatus status      = 11;
  AIVerdict    ai_verdict  = 12;
  string ai_time_complexity  = 13;
  string ai_space_complexity = 14;
  string ai_pattern        = 15;
  repeated string ai_strengths  = 16;
  repeated string ai_weaknesses = 17;
  string ai_hint           = 18;
  map<string, string> ai_skill_signals = 19;

  // Level 3: duel comparison
  string comparison_summary = 20;

  google.protobuf.Timestamp created_at = 21;
}
