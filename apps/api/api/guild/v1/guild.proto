syntax = "proto3";

package guild.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "event/v1/event.proto";

option go_package = "api/pkg/api/guild/v1;v1";

service GuildService {
  rpc ListGuilds(ListGuildsRequest) returns (ListGuildsResponse) {
    option (google.api.http) = { get: "/api/v1/guilds" };
  }

  rpc CreateGuild(CreateGuildRequest) returns (GuildResponse) {
    option (google.api.http) = {
      post: "/api/v1/guilds"
      body: "*"
    };
  }

  rpc JoinGuild(JoinGuildRequest) returns (JoinGuildResponse) {
    option (google.api.http) = {
      post: "/api/v1/guilds/{guild_id}/join"
      body: "*"
    };
  }

  rpc LeaveGuild(LeaveGuildRequest) returns (LeaveGuildResponse) {
    option (google.api.http) = {
      post: "/api/v1/guilds/{guild_id}/leave"
      body: "*"
    };
  }

  rpc InviteToGuild(InviteToGuildRequest) returns (InviteToGuildResponse) {
    option (google.api.http) = {
      post: "/api/v1/guilds/{guild_id}/invite"
      body: "*"
    };
  }

  rpc ListGuildMembers(ListGuildMembersRequest) returns (ListGuildMembersResponse) {
    option (google.api.http) = { get: "/api/v1/guilds/{guild_id}/members" };
  }

  rpc ListGuildEvents(ListGuildEventsRequest) returns (ListGuildEventsResponse) {
    option (google.api.http) = { get: "/api/v1/guilds/{guild_id}/events" };
  }

  rpc CreateGuildEvent(CreateGuildEventRequest) returns (CreateGuildEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/guilds/{guild_id}/events"
      body: "*"
    };
  }

  rpc DeleteGuild(DeleteGuildRequest) returns (DeleteGuildResponse) {
    option (google.api.http) = {
      delete: "/api/v1/guilds/{guild_id}"
    };
  }

  rpc GetGuildPulse(GetGuildPulseRequest) returns (GetGuildPulseResponse) {
    option (google.api.http) = { get: "/api/v1/guilds/{guild_id}/pulse" };
  }

  rpc GetGuildMemberStats(GetGuildMemberStatsRequest) returns (GetGuildMemberStatsResponse) {
    option (google.api.http) = { get: "/api/v1/guilds/{guild_id}/member-stats" };
  }

  rpc GetActiveGuildChallenge(GetActiveGuildChallengeRequest) returns (GetActiveGuildChallengeResponse) {
    option (google.api.http) = { get: "/api/v1/guilds/{guild_id}/challenge" };
  }

  rpc CreateGuildChallenge(CreateGuildChallengeRequest) returns (CreateGuildChallengeResponse) {
    option (google.api.http) = {
      post: "/api/v1/guilds/{guild_id}/challenge"
      body: "*"
    };
  }
}

enum GuildMemberRole {
  GUILD_MEMBER_ROLE_UNSPECIFIED = 0;
  GUILD_MEMBER_ROLE_CREATOR     = 1;
  GUILD_MEMBER_ROLE_MEMBER      = 2;
}

enum GuildMemberActionType {
  GUILD_MEMBER_ACTION_TYPE_UNSPECIFIED = 0;
  GUILD_MEMBER_ACTION_TYPE_DAILY       = 1;
  GUILD_MEMBER_ACTION_TYPE_DUEL        = 2;
  GUILD_MEMBER_ACTION_TYPE_MOCK        = 3;
}

message ListGuildsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message CreateGuildRequest {
  string name = 1;
  string description = 2;
  repeated string tags = 3;
  bool is_public = 4;
}

message JoinGuildRequest {
  string guild_id = 1;
}

message LeaveGuildRequest {
  string guild_id = 1;
}

message ListGuildsResponse {
  repeated Guild guilds = 1;
  int32 total_count = 2;
}

message GuildResponse {
  Guild guild = 1;
}

message JoinGuildResponse {
  common.v1.OperationStatus status = 1;
}

message LeaveGuildResponse {
  common.v1.OperationStatus status = 1;
}

message InviteToGuildRequest {
  string guild_id = 1;
  string user_id = 2;
}

message InviteToGuildResponse {
  common.v1.OperationStatus status = 1;
}

message ListGuildMembersRequest {
  string guild_id = 1;
}

message GuildMember {
  string                    user_id    = 1;
  string                    first_name = 2;
  string                    last_name  = 3;
  string                    avatar_url = 4;
  GuildMemberRole          role       = 5;
  google.protobuf.Timestamp joined_at  = 6;
}

message ListGuildMembersResponse {
  repeated GuildMember members = 1;
}

message ListGuildEventsRequest {
  string                 guild_id = 1;
  event.v1.EventListFilter status   = 2;
}

message ListGuildEventsResponse {
  repeated event.v1.Event events = 1;
}

message CreateGuildEventRequest {
  string guild_id   = 1;
  string title       = 2;
  string description = 3;
  string meeting_link = 4;
  string place_label  = 5;
  string scheduled_at = 6;  // RFC3339
  string repeat       = 7;
}

message CreateGuildEventResponse {
  event.v1.Event event = 1;
}

message DeleteGuildRequest {
  string guild_id = 1;
}

message DeleteGuildResponse {
  common.v1.OperationStatus status = 1;
}

message Guild {
  string id = 1;
  string name = 2;
  string description = 3;
  string creator_id = 4;
  uint32 member_count = 5;
  repeated string tags = 6;
  bool is_public = 7;
  bool is_joined = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Pulse

message GetGuildPulseRequest {
  string guild_id = 1;
}

message GuildDayActivity {
  string date        = 1;
  int32  daily_count = 2;
  int32  duel_count  = 3;
  int32  mock_count  = 4;
}

message GuildMemberAction {
  string                    user_id       = 1;
  string                    first_name    = 2;
  string                    last_name     = 3;
  string                    avatar_url    = 4;
  GuildMemberActionType    action_type   = 5;
  string                    action_detail = 6;
  google.protobuf.Timestamp happened_at   = 7;
}

message GetGuildPulseResponse {
  int32                        active_today   = 1;
  int32                        total_members  = 2;
  repeated GuildDayActivity   week_activity  = 3;
  repeated GuildMemberAction  recent_actions = 4;
}

// Member stats

message GetGuildMemberStatsRequest {
  string guild_id = 1;
}

message GuildMemberStatsEntry {
  string                    user_id        = 1;
  string                    first_name     = 2;
  string                    last_name      = 3;
  string                    avatar_url     = 4;
  GuildMemberRole          role           = 5;
  google.protobuf.Timestamp joined_at      = 6;
  int32                     daily_solved   = 7;
  int32                     duels_won      = 8;
  int32                     duels_played   = 9;
  int32                     mocks_done     = 10;
  int32                     arena_rating   = 11;
  string                    arena_league   = 12;
}

message GetGuildMemberStatsResponse {
  repeated GuildMemberStatsEntry members = 1;
}

// Challenges

message GetActiveGuildChallengeRequest {
  string guild_id = 1;
}

message ChallengeMemberProgress {
  string user_id    = 1;
  string first_name = 2;
  string last_name  = 3;
  string avatar_url = 4;
  int32  current    = 5;
}

message GuildChallengeData {
  string                          id           = 1;
  string                          guild_id    = 2;
  string                          template_key = 3;
  int32                           target_value = 4;
  google.protobuf.Timestamp       starts_at    = 5;
  google.protobuf.Timestamp       ends_at      = 6;
  string                          created_by   = 7;
  repeated ChallengeMemberProgress progress    = 8;
}

message GetActiveGuildChallengeResponse {
  GuildChallengeData challenge = 1;
}

message CreateGuildChallengeRequest {
  string guild_id    = 1;
  string template_key = 2;
  int32  target_value = 3;
}

message CreateGuildChallengeResponse {
  GuildChallengeData challenge = 1;
}
