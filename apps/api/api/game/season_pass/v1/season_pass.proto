syntax = "proto3";

package season_pass.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "api/pkg/api/season_pass/v1;v1";

// SeasonPassService exposes the current season's tiered-reward track. Each
// season has a fixed tier ladder (~40 tiers); free rewards are claimable by
// every player as they accumulate XP, premium rewards require buying the
// season pass first.
service SeasonPassService {
  // GetActive returns the currently active season pass with its full tier
  // ladder and the authenticated user's progress + claim state baked in.
  rpc GetActive(GetActiveRequest) returns (GetActiveResponse) {
    option (google.api.http) = { get: "/api/v1/season-pass/active" };
  }

  // ClaimTierReward claims one tier reward. Caller must have reached the
  // tier; premium rewards require has_premium.
  rpc ClaimTierReward(ClaimTierRewardRequest) returns (ClaimTierRewardResponse) {
    option (google.api.http) = {
      post: "/api/v1/season-pass/claim"
      body: "*"
    };
  }

  // PurchasePremium flips has_premium for the current season. Idempotent.
  rpc PurchasePremium(PurchasePremiumRequest) returns (PurchasePremiumResponse) {
    option (google.api.http) = {
      post: "/api/v1/season-pass/purchase-premium"
      body: "*"
    };
  }

  // --- Admin CRUD (requires IsAdmin=true) -----------------------------------

  rpc AdminListPasses(AdminListPassesRequest) returns (AdminListPassesResponse) {
    option (google.api.http) = { get: "/api/v1/admin/season-pass" };
  }

  rpc AdminCreatePass(AdminCreatePassRequest) returns (SeasonPassAdminRow) {
    option (google.api.http) = {
      post: "/api/v1/admin/season-pass"
      body: "*"
    };
  }

  rpc AdminUpdatePass(AdminUpdatePassRequest) returns (SeasonPassAdminRow) {
    option (google.api.http) = {
      put: "/api/v1/admin/season-pass/{id}"
      body: "*"
    };
  }

  rpc AdminDeletePass(AdminDeletePassRequest) returns (AdminSeasonPassDeleteResponse) {
    option (google.api.http) = { delete: "/api/v1/admin/season-pass/{id}" };
  }

  rpc AdminUpsertTier(AdminUpsertTierRequest) returns (SeasonPassTier) {
    option (google.api.http) = {
      put: "/api/v1/admin/season-pass/{season_pass_id}/tiers/{tier}"
      body: "*"
    };
  }

  rpc AdminDeleteTier(AdminDeleteTierRequest) returns (AdminSeasonPassDeleteResponse) {
    option (google.api.http) = { delete: "/api/v1/admin/season-pass/{season_pass_id}/tiers/{tier}" };
  }
}

enum RewardKind {
  REWARD_KIND_UNSPECIFIED = 0;
  REWARD_KIND_GOLD        = 1;
  REWARD_KIND_GEMS        = 2;
  REWARD_KIND_XP          = 3;
  REWARD_KIND_FRAME       = 4;
  REWARD_KIND_PET         = 5;
  REWARD_KIND_EMOTE       = 6;
  REWARD_KIND_BANNER      = 7;
  REWARD_KIND_AURA        = 8;
  REWARD_KIND_COSMETIC    = 9;
}

enum RewardTrack {
  REWARD_TRACK_UNSPECIFIED = 0;
  REWARD_TRACK_FREE        = 1;
  REWARD_TRACK_PREMIUM     = 2;
}

message SeasonPass {
  string                    id                  = 1;
  int32                     season_number       = 2;
  string                    title               = 3;
  string                    subtitle            = 4;
  google.protobuf.Timestamp starts_at           = 5;
  google.protobuf.Timestamp ends_at             = 6;
  int32                     max_tier            = 7;
  int32                     xp_per_tier         = 8;
  int32                     premium_price_gems  = 9;
}

message SeasonPassTier {
  int32      tier                  = 1;
  RewardKind free_reward_kind      = 2;
  int32      free_reward_amount    = 3;
  string     free_reward_label     = 4;
  RewardKind premium_reward_kind   = 5;
  int32      premium_reward_amount = 6;
  string     premium_reward_label  = 7;
}

message SeasonPassProgress {
  int32          xp              = 1;
  int32          current_tier    = 2;
  bool           has_premium     = 3;
  repeated int32 claimed_free    = 4;
  repeated int32 claimed_premium = 5;
}

message GetActiveRequest {}

message GetActiveResponse {
  SeasonPass                pass     = 1;
  repeated SeasonPassTier   tiers    = 2;
  SeasonPassProgress        progress = 3;
}

message ClaimTierRewardRequest {
  int32       tier  = 1;
  RewardTrack track = 2;
}

message ClaimTierRewardResponse {
  SeasonPassProgress progress       = 1;
  RewardKind         claimed_kind   = 2;
  int32              claimed_amount = 3;
  string             claimed_label  = 4;
}

message PurchasePremiumRequest {}

message PurchasePremiumResponse {
  SeasonPassProgress progress = 1;
}

// --- Admin messages -------------------------------------------------------

message SeasonPassAdminRow {
  string                    id                 = 1;
  int32                     season_number      = 2;
  string                    title              = 3;
  string                    subtitle           = 4;
  google.protobuf.Timestamp starts_at          = 5;
  google.protobuf.Timestamp ends_at            = 6;
  int32                     max_tier           = 7;
  int32                     xp_per_tier        = 8;
  int32                     premium_price_gems = 9;
  repeated SeasonPassTier   tiers              = 10;
}

message AdminListPassesRequest {}
message AdminListPassesResponse {
  repeated SeasonPassAdminRow passes = 1;
}

message AdminCreatePassRequest {
  int32  season_number      = 1;
  string title              = 2;
  string subtitle           = 3;
  string starts_at          = 4; // RFC3339
  string ends_at            = 5; // RFC3339
  int32  max_tier           = 6;
  int32  xp_per_tier        = 7;
  int32  premium_price_gems = 8;
}

message AdminUpdatePassRequest {
  string id                 = 1;
  string title              = 2;
  string subtitle           = 3;
  string starts_at          = 4; // RFC3339
  string ends_at            = 5; // RFC3339
  int32  max_tier           = 6;
  int32  xp_per_tier        = 7;
  int32  premium_price_gems = 8;
}

message AdminDeletePassRequest {
  string id = 1;
}

message AdminSeasonPassDeleteResponse {
  bool ok = 1;
}

message AdminUpsertTierRequest {
  string     season_pass_id       = 1;
  int32      tier                 = 2;
  RewardKind free_reward_kind     = 3;
  int32      free_reward_amount   = 4;
  string     free_reward_label    = 5;
  RewardKind premium_reward_kind  = 6;
  int32      premium_reward_amount = 7;
  string     premium_reward_label = 8;
}

message AdminDeleteTierRequest {
  string season_pass_id = 1;
  int32  tier           = 2;
}
