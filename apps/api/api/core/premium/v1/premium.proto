syntax = "proto3";

package premium.v1;

import "google/api/annotations.proto";

option go_package = "api/pkg/api/premium/v1;v1";

service PremiumService {
  rpc GetStatus(GetStatusRequest) returns (PremiumStatus) {
    option (google.api.http) = { get: "/api/v1/premium/status" };
  }

  rpc LinkBoosty(LinkBoostyRequest) returns (PremiumStatus) {
    option (google.api.http) = {
      post: "/api/v1/premium/boosty/link"
      body: "*"
    };
  }

  rpc UnlinkBoosty(UnlinkBoostyRequest) returns (UnlinkBoostyResponse) {
    option (google.api.http) = { delete: "/api/v1/premium/boosty/link" };
  }
}

message GetStatusRequest {}

message PremiumStatus {
  bool active          = 1;
  string source        = 2;
  string boosty_email  = 3;
  string expires_at    = 4;
}

message LinkBoostyRequest {
  string email = 1;
}

message UnlinkBoostyRequest {}

message UnlinkBoostyResponse {
  string status = 1;
}
