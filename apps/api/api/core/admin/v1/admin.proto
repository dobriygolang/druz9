syntax = "proto3";

package admin.v1;

import "google/api/annotations.proto";
import "core/common/v1/common.proto";

option go_package = "api/pkg/api/admin/v1;v1";

service AdminService {
  rpc DeleteUser(DeleteUserRequest) returns (AdminStatusResponse) {
    option (google.api.http) = { delete: "/api/admin/users/{user_id}" };
  }
  rpc UpdateUserTrust(UpdateUserTrustRequest) returns (AdminStatusResponse) {
    option (google.api.http) = { patch: "/api/admin/users/{user_id}/trust", body: "*" };
  }
  rpc UpdateUserAdmin(UpdateUserAdminRequest) returns (AdminStatusResponse) {
    option (google.api.http) = { patch: "/api/admin/users/{user_id}/admin", body: "*" };
  }
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {
    option (google.api.http) = { get: "/api/admin/config/{key}" };
  }
  rpc ListConfig(ListConfigRequest) returns (ListConfigResponse) {
    option (google.api.http) = { get: "/api/admin/config" };
  }
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse) {
    option (google.api.http) = { put: "/api/admin/config/{key}", body: "*" };
  }
  rpc GetRuntimeConfig(GetRuntimeConfigRequest) returns (GetRuntimeConfigResponse) {
    option (google.api.http) = { get: "/api/public/runtime-config" };
  }

  // Admin grant — credit any wallet currency to any user. Mirrors the
  // shop's Purchase debit but in reverse; intended for support tooling
  // and seasonal events. Audited via wallet ledger automatically.
  rpc GrantCurrency(GrantCurrencyRequest) returns (AdminStatusResponse) {
    option (google.api.http) = { post: "/api/admin/users/{user_id}/grant", body: "*" };
  }
}

message DeleteUserRequest {
  string user_id = 1;
}

message UpdateUserTrustRequest {
  string user_id   = 1;
  bool   is_trusted = 2;
}

message UpdateUserAdminRequest {
  string user_id  = 1;
  bool   is_admin = 2;
}

// Currency strings the wallet domain understands ("gold", "gems", "shards").
// Kept as a string instead of an enum so we can introduce new currencies
// (souls, etc.) without touching this proto.
message GrantCurrencyRequest {
  string user_id  = 1;
  string currency = 2;
  int64  amount   = 3;
  // Free-form note recorded in the ledger so audits can trace why a
  // grant happened (event, support ticket id, etc.).
  string reason   = 4;
}

message GetRuntimeConfigRequest {}

message AdminStatusResponse {
  common.v1.OperationStatus status = 1;
}

message GetConfigRequest {
  string key = 1;
}

message GetConfigResponse {
  string key = 1;
  string value = 2;
  string type = 3;
  bool writable = 4;
  string usage = 5;
  string group = 6;
}

message ListConfigRequest {}

message ListConfigResponse {
  repeated ConfigItem configs = 1;
}

message ConfigItem {
  string key = 1;
  string value = 2;
  string type = 3;
  bool writable = 4;
  string usage = 5;
  string group = 6;
}

message UpdateConfigRequest {
  string key = 1;
  string value = 2;
}

message UpdateConfigResponse {
  string key = 1;
  string value = 2;
  bool success = 3;
}

message GetRuntimeConfigResponse {
  bool app_require_auth   = 1;
  bool arena_require_auth = 2;
}
