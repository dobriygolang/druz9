syntax = "proto3";

package hub.v1;

import "google/api/annotations.proto";

option go_package = "api/pkg/api/hub/v1;v1";

service HubService {
  rpc GetOverview(GetOverviewRequest) returns (GetOverviewResponse) {
    option (google.api.http) = {
      get: "/api/v1/hub/overview"
    };
  }

  // ADR-002 — Region detail card on the SVG atlas. The region_id is one
  // of the curated atlas-region slugs (north_peaks, capital_market, …).
  // Server returns localized title/body + counts of nearby resources
  // (open events, active guilds, etc.) the frontend renders inline.
  rpc GetRegionContext(GetRegionContextRequest) returns (RegionContext) {
    option (google.api.http) = { get: "/api/v1/hub/regions/{region_id}" };
  }
}

message GetOverviewRequest {}

message GetOverviewResponse {
  HubPlayer player = 1;
  repeated HubDailyMission daily_missions = 2;
  HubQuest quest = 3;
  HubArena arena = 4;
  repeated HubEvent events = 5;
  HubGuild guild = 6;
  repeated HubMerchantPick merchant_picks = 7;
  HubSeason active_season = 8;
}

// HubSeason describes the currently-live season pass (number, title and
// a short "days left" label). `number == 0` means no active season.
message HubSeason {
  int32  number     = 1;
  string title      = 2;
  // Roman numeral ("I", "II", "III"…) — ready for display.
  string roman      = 3;
  // Short human label e.g. "19 дн. осталось" — server-localised eventually;
  // for now just "N days left" so client can choose to replace it.
  string days_left_label = 4;
}

message HubPlayer {
  string id = 1;
  string display_name = 2;
  string title = 3;
  string level_label = 4;
  int32 streak_days = 5;
  HubAchievements achievements = 6;
}

message HubAchievements {
  int32 unlocked = 1;
  int32 total = 2;
}

message HubDailyMission {
  string key = 1;
  string title = 2;
  string progress_label = 3;
  int32 current = 4;
  int32 target = 5;
  bool completed = 6;
  string reward_label = 7;
  string action_url = 8;
  string icon = 9;
}

message HubQuest {
  string title = 1;
  string description = 2;
  int32 progress_pct = 3;
  string action_url = 4;
  string action_label = 5;
}

message HubArena {
  repeated HubArenaItem items = 1;
}

message HubArenaItem {
  string label = 1;
  string meta = 2;
  string action_url = 3;
}

message HubEvent {
  string id = 1;
  string title = 2;
  string starts_at = 3;
  string meta = 4;
  string action_url = 5;
}

message HubGuild {
  string id = 1;
  string name = 2;
  repeated string member_preview = 3;
  string action_url = 4;
}

message HubMerchantPick {
  string id = 1;
  string name = 2;
  string rarity = 3;
  string price_label = 4;
  string action_url = 5;
}

// ── ADR-002 region context ───────────────────────────────────────────────

message GetRegionContextRequest {
  string region_id = 1;
}

message RegionContext {
  string region_id   = 1;
  string title       = 2;  // localized
  string description = 3;  // localized; 1–2 sentences
  // Counts surface as small badges in the panel.
  int32 active_guilds = 4;
  int32 open_events   = 5;
  int32 podcasts      = 6;
  // CTA links the frontend can render as buttons.
  repeated RegionLink links = 7;
}

message RegionLink {
  string label      = 1;
  string action_url = 2;
}
