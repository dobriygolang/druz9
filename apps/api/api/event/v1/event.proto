syntax = "proto3";

package event.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "api/pkg/api/event/v1;v1";

service EventService {
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse) {
    option (google.api.http) = { get: "/api/v1/events" };
  }

  rpc CreateEvent(CreateEventRequest) returns (EventResponse) {
    option (google.api.http) = {
      post: "/api/v1/events"
      body: "*"
    };
  }

  rpc JoinEvent(JoinEventRequest) returns (EventResponse) {
    option (google.api.http) = {
      post: "/api/v1/events/{event_id}/join"
      body: "*"
    };
  }

  rpc LeaveEvent(LeaveEventRequest) returns (LeaveEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/events/{event_id}/leave"
      body: "*"
    };
  }

  rpc UpdateEvent(UpdateEventRequest) returns (EventResponse) {
    option (google.api.http) = {
      put: "/api/v1/events/{event_id}"
      body: "*"
    };
  }

  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse) {
    option (google.api.http) = { delete: "/api/v1/events/{event_id}" };
  }
}

message ListEventsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string status = 3; // "upcoming" or "past"
  string creator_id = 4;
}

message CreateEventRequest {
  string title = 1;
  string place_label = 2;
  string region = 3;
  string country = 4;
  string city = 5;
  double latitude = 6;
  double longitude = 7;
  google.protobuf.Timestamp scheduled_at = 8;
  repeated string invited_user_ids = 9;
  string description = 10;
  string meeting_link = 11;
}

message JoinEventRequest {
  string event_id = 1;
}

message LeaveEventRequest {
  string event_id = 1;
}

message UpdateEventRequest {
  string event_id = 1;
  string title = 2;
  string place_label = 3;
  string region = 4;
  string country = 5;
  string city = 6;
  double latitude = 7;
  double longitude = 8;
  google.protobuf.Timestamp scheduled_at = 9;
  repeated string invited_user_ids = 10;
  string description = 11;
  string meeting_link = 12;
}

message DeleteEventRequest {
  string event_id = 1;
}

message ListEventsResponse {
  repeated Event events = 1;
  int32 limit = 2;
  int32 offset = 3;
  int32 total_count = 4;
  bool has_next_page = 5;
}

message EventResponse {
  Event event = 1;
}

message LeaveEventResponse {
  string status = 1;
}

message DeleteEventResponse {
  string status = 1;
}

message Event {
  string id = 1;
  string title = 2;
  string place_label = 3;
  string region = 4;
  string country = 5;
  string city = 6;
  double latitude = 7;
  double longitude = 8;
  google.protobuf.Timestamp scheduled_at = 9;
  google.protobuf.Timestamp created_at = 10;
  string creator_id = 11;
  string creator_name = 12;
  bool is_creator = 13;
  bool is_joined = 14;
  uint32 participant_count = 15;
  repeated EventParticipant participants = 16;
  string description = 17;
  string meeting_link = 18;
}

message EventParticipant {
  string user_id = 1;
  string title = 2;
  string avatar_url = 3;
  string telegram_username = 4;
  string first_name = 5;
  string last_name = 6;
  string status = 7;
}
