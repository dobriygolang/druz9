syntax = "proto3";

package circle.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "event/v1/event.proto";

option go_package = "api/pkg/api/circle/v1;v1";

service CircleService {
  rpc ListCircles(ListCirclesRequest) returns (ListCirclesResponse) {
    option (google.api.http) = { get: "/api/v1/circles" };
  }

  rpc CreateCircle(CreateCircleRequest) returns (CircleResponse) {
    option (google.api.http) = {
      post: "/api/v1/circles"
      body: "*"
    };
  }

  rpc JoinCircle(JoinCircleRequest) returns (JoinCircleResponse) {
    option (google.api.http) = {
      post: "/api/v1/circles/{circle_id}/join"
      body: "*"
    };
  }

  rpc LeaveCircle(LeaveCircleRequest) returns (LeaveCircleResponse) {
    option (google.api.http) = {
      post: "/api/v1/circles/{circle_id}/leave"
      body: "*"
    };
  }

  rpc InviteToCircle(InviteToCircleRequest) returns (InviteToCircleResponse) {
    option (google.api.http) = {
      post: "/api/v1/circles/{circle_id}/invite"
      body: "*"
    };
  }

  rpc ListCircleMembers(ListCircleMembersRequest) returns (ListCircleMembersResponse) {
    option (google.api.http) = { get: "/api/v1/circles/{circle_id}/members" };
  }

  rpc ListCircleEvents(ListCircleEventsRequest) returns (ListCircleEventsResponse) {
    option (google.api.http) = { get: "/api/v1/circles/{circle_id}/events" };
  }

  rpc CreateCircleEvent(CreateCircleEventRequest) returns (CreateCircleEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/circles/{circle_id}/events"
      body: "*"
    };
  }

  rpc DeleteCircle(DeleteCircleRequest) returns (DeleteCircleResponse) {
    option (google.api.http) = {
      delete: "/api/v1/circles/{circle_id}"
    };
  }

  rpc GetCirclePulse(GetCirclePulseRequest) returns (GetCirclePulseResponse) {
    option (google.api.http) = { get: "/api/v1/circles/{circle_id}/pulse" };
  }

  rpc GetCircleMemberStats(GetCircleMemberStatsRequest) returns (GetCircleMemberStatsResponse) {
    option (google.api.http) = { get: "/api/v1/circles/{circle_id}/member-stats" };
  }

  rpc GetActiveCircleChallenge(GetActiveCircleChallengeRequest) returns (GetActiveCircleChallengeResponse) {
    option (google.api.http) = { get: "/api/v1/circles/{circle_id}/challenge" };
  }

  rpc CreateCircleChallenge(CreateCircleChallengeRequest) returns (CreateCircleChallengeResponse) {
    option (google.api.http) = {
      post: "/api/v1/circles/{circle_id}/challenge"
      body: "*"
    };
  }
}

enum CircleMemberRole {
  CIRCLE_MEMBER_ROLE_UNSPECIFIED = 0;
  CIRCLE_MEMBER_ROLE_CREATOR     = 1;
  CIRCLE_MEMBER_ROLE_MEMBER      = 2;
}

enum CircleMemberActionType {
  CIRCLE_MEMBER_ACTION_TYPE_UNSPECIFIED = 0;
  CIRCLE_MEMBER_ACTION_TYPE_DAILY       = 1;
  CIRCLE_MEMBER_ACTION_TYPE_DUEL        = 2;
  CIRCLE_MEMBER_ACTION_TYPE_MOCK        = 3;
}

message ListCirclesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message CreateCircleRequest {
  string name = 1;
  string description = 2;
  repeated string tags = 3;
  bool is_public = 4;
}

message JoinCircleRequest {
  string circle_id = 1;
}

message LeaveCircleRequest {
  string circle_id = 1;
}

message ListCirclesResponse {
  repeated Circle circles = 1;
  int32 total_count = 2;
}

message CircleResponse {
  Circle circle = 1;
}

message JoinCircleResponse {
  common.v1.OperationStatus status = 1;
}

message LeaveCircleResponse {
  common.v1.OperationStatus status = 1;
}

message InviteToCircleRequest {
  string circle_id = 1;
  string user_id = 2;
}

message InviteToCircleResponse {
  common.v1.OperationStatus status = 1;
}

message ListCircleMembersRequest {
  string circle_id = 1;
}

message CircleMember {
  string                    user_id    = 1;
  string                    first_name = 2;
  string                    last_name  = 3;
  string                    avatar_url = 4;
  CircleMemberRole          role       = 5;
  google.protobuf.Timestamp joined_at  = 6;
}

message ListCircleMembersResponse {
  repeated CircleMember members = 1;
}

message ListCircleEventsRequest {
  string circle_id = 1;
  string status    = 2;
}

message ListCircleEventsResponse {
  repeated event.v1.Event events = 1;
}

message CreateCircleEventRequest {
  string circle_id   = 1;
  string title       = 2;
  string description = 3;
  string meeting_link = 4;
  string place_label  = 5;
  string scheduled_at = 6;  // RFC3339
  string repeat       = 7;
}

message CreateCircleEventResponse {
  event.v1.Event event = 1;
}

message DeleteCircleRequest {
  string circle_id = 1;
}

message DeleteCircleResponse {
  common.v1.OperationStatus status = 1;
}

message Circle {
  string id = 1;
  string name = 2;
  string description = 3;
  string creator_id = 4;
  uint32 member_count = 5;
  repeated string tags = 6;
  bool is_public = 7;
  bool is_joined = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Pulse

message GetCirclePulseRequest {
  string circle_id = 1;
}

message CircleDayActivity {
  string date        = 1;
  int32  daily_count = 2;
  int32  duel_count  = 3;
  int32  mock_count  = 4;
}

message CircleMemberAction {
  string                    user_id       = 1;
  string                    first_name    = 2;
  string                    last_name     = 3;
  string                    avatar_url    = 4;
  CircleMemberActionType    action_type   = 5;
  string                    action_detail = 6;
  google.protobuf.Timestamp happened_at   = 7;
}

message GetCirclePulseResponse {
  int32                        active_today   = 1;
  int32                        total_members  = 2;
  repeated CircleDayActivity   week_activity  = 3;
  repeated CircleMemberAction  recent_actions = 4;
}

// Member stats

message GetCircleMemberStatsRequest {
  string circle_id = 1;
}

message CircleMemberStatsEntry {
  string                    user_id        = 1;
  string                    first_name     = 2;
  string                    last_name      = 3;
  string                    avatar_url     = 4;
  CircleMemberRole          role           = 5;
  google.protobuf.Timestamp joined_at      = 6;
  int32                     daily_solved   = 7;
  int32                     duels_won      = 8;
  int32                     duels_played   = 9;
  int32                     mocks_done     = 10;
  int32                     arena_rating   = 11;
  string                    arena_league   = 12;
}

message GetCircleMemberStatsResponse {
  repeated CircleMemberStatsEntry members = 1;
}

// Challenges

message GetActiveCircleChallengeRequest {
  string circle_id = 1;
}

message ChallengeMemberProgress {
  string user_id    = 1;
  string first_name = 2;
  string last_name  = 3;
  string avatar_url = 4;
  int32  current    = 5;
}

message CircleChallengeData {
  string                          id           = 1;
  string                          circle_id    = 2;
  string                          template_key = 3;
  int32                           target_value = 4;
  google.protobuf.Timestamp       starts_at    = 5;
  google.protobuf.Timestamp       ends_at      = 6;
  string                          created_by   = 7;
  repeated ChallengeMemberProgress progress    = 8;
}

message GetActiveCircleChallengeResponse {
  CircleChallengeData challenge = 1;
}

message CreateCircleChallengeRequest {
  string circle_id    = 1;
  string template_key = 2;
  int32  target_value = 3;
}

message CreateCircleChallengeResponse {
  CircleChallengeData challenge = 1;
}
