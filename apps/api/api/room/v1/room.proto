syntax = "proto3";

package room.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "api/pkg/api/room/v1;v1";

service RoomService {
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse) {
    option (google.api.http) = { get: "/api/v1/rooms" };
  }

  rpc GetRoom(GetRoomRequest) returns (RoomResponse) {
    option (google.api.http) = { get: "/api/v1/rooms/{room_id}" };
  }

  rpc CreateRoom(CreateRoomRequest) returns (RoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/rooms"
      body: "*"
    };
  }

  rpc UpdateRoom(UpdateRoomRequest) returns (RoomResponse) {
    option (google.api.http) = {
      patch: "/api/v1/rooms/{room_id}"
      body: "*"
    };
  }

  rpc DeleteRoom(DeleteRoomRequest) returns (RoomStatusResponse) {
    option (google.api.http) = { delete: "/api/v1/rooms/{room_id}" };
  }

  rpc JoinRoomToken(JoinRoomTokenRequest) returns (JoinRoomTokenResponse) {
    option (google.api.http) = { get: "/api/v1/rooms/{room_id}/join-token" };
  }

  rpc GetRoomMediaState(GetRoomMediaStateRequest) returns (RoomMediaStateResponse) {
    option (google.api.http) = { get: "/api/v1/rooms/{room_id}/media-state" };
  }

  rpc UpsertRoomMediaState(UpsertRoomMediaStateRequest) returns (RoomMediaStateResponse) {
    option (google.api.http) = {
      put: "/api/v1/rooms/{room_id}/media-state"
      body: "*"
    };
  }
}

message ListRoomsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string kind = 3;
}

message GetRoomRequest {
  string room_id = 1;
}

message CreateRoomRequest {
  string title = 1;
  string kind = 2;
  string description = 3;
  bool is_private = 4;
  string media_url = 5;
}

message UpdateRoomRequest {
  string room_id = 1;
  string title = 2;
  string description = 3;
  bool is_private = 4;
  string media_url = 5;
}

message DeleteRoomRequest {
  string room_id = 1;
}

message JoinRoomTokenRequest {
  string room_id = 1;
}

message GetRoomMediaStateRequest {
  string room_id = 1;
}

message UpsertRoomMediaStateRequest {
  string room_id = 1;
  string media_url = 2;
  bool paused = 3;
  int32 current_time_seconds = 4;
}

message ListRoomsResponse {
  repeated Room rooms = 1;
  int32 limit = 2;
  int32 offset = 3;
  int32 total_count = 4;
  bool has_next_page = 5;
}

message RoomResponse {
  Room room = 1;
}

message RoomStatusResponse {
  string status = 1;
}

message JoinRoomTokenResponse {
  string access_token = 1;
  string provider = 2;
  Room room = 3;
  string server_url = 4;
}

message RoomMediaStateResponse {
  RoomMediaState media_state = 1;
}

message Room {
  string id = 1;
  string title = 2;
  string kind = 3;
  string description = 4;
  bool is_private = 5;
  string creator_id = 6;
  string creator_name = 7;
  int32 member_count = 8;
  bool is_joined = 9;
  bool is_owner = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  repeated RoomParticipant participants = 13;
  RoomMediaState media_state = 14;
}

message RoomParticipant {
  string user_id = 1;
  string title = 2;
  string avatar_url = 3;
  string telegram_username = 4;
  string first_name = 5;
  string last_name = 6;
  bool is_current_user = 7;
  google.protobuf.Timestamp joined_at = 8;
}

message RoomMediaState {
  string room_id = 1;
  string media_url = 2;
  bool paused = 3;
  int32 current_time_seconds = 4;
  string updated_by = 5;
  string updated_by_name = 6;
  google.protobuf.Timestamp updated_at = 7;
}
