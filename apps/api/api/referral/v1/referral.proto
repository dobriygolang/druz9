syntax = "proto3";

package referral.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "api/pkg/api/referral/v1;v1";

service ReferralService {
  rpc ListReferrals(ListReferralsRequest) returns (ListReferralsResponse) {
    option (google.api.http) = { get: "/api/v1/referrals" };
  }

  rpc CreateReferral(CreateReferralRequest) returns (ReferralResponse) {
    option (google.api.http) = {
      post: "/api/v1/referrals"
      body: "*"
    };
  }

  rpc UpdateReferral(UpdateReferralRequest) returns (ReferralResponse) {
    option (google.api.http) = {
      put: "/api/v1/referrals/{referral_id}"
      body: "*"
    };
  }

  rpc DeleteReferral(DeleteReferralRequest) returns (ReferralStatusResponse) {
    option (google.api.http) = { delete: "/api/v1/referrals/{referral_id}" };
  }
}

message ListReferralsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message CreateReferralRequest {
  string title = 1;
  string company = 2;
  string vacancy_url = 3;
  string description = 4;
  string experience = 5;
  string location = 6;
  EmploymentType employment_type = 7;
}

enum EmploymentType {
  EMPLOYMENT_TYPE_UNSPECIFIED = 0;
  EMPLOYMENT_TYPE_FULL_TIME = 1;
  EMPLOYMENT_TYPE_PART_TIME = 2;
  EMPLOYMENT_TYPE_CONTRACT = 3;
  EMPLOYMENT_TYPE_INTERNSHIP = 4;
  EMPLOYMENT_TYPE_REMOTE = 5;
}

message UpdateReferralRequest {
  string referral_id = 1;
  string title = 2;
  string company = 3;
  string vacancy_url = 4;
  string description = 5;
  string experience = 6;
  string location = 7;
  EmploymentType employment_type = 8;
}

message DeleteReferralRequest {
  string referral_id = 1;
}

message ListReferralsResponse {
  repeated Referral referrals = 1;
  int32 limit = 2;
  int32 offset = 3;
  int32 total_count = 4;
  bool has_next_page = 5;
}

message ReferralResponse {
  Referral referral = 1;
}

message ReferralStatusResponse {
  string status = 1;
}

message Referral {
  string id = 1;
  string user_id = 2;
  string author_name = 3;
  string author_telegram_username = 4;
  string author_telegram_profile_url = 5;
  string title = 6;
  string company = 7;
  string vacancy_url = 8;
  string description = 9;
  string experience = 10;
  string location = 11;
  EmploymentType employment_type = 12;
  bool is_owner = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}
