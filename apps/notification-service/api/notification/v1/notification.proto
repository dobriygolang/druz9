syntax = "proto3";

package notification.v1;

option go_package = "notification-service/pkg/notification/v1;v1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// NotificationService is an internal gRPC service for sending notifications.
// No HTTP annotations — used only for service-to-service communication.
service NotificationService {
  // Send enqueues a single notification for delivery.
  rpc Send(SendRequest) returns (SendResponse);

  // SendBatch enqueues notifications for multiple users (e.g. guild fan-out).
  rpc SendBatch(SendBatchRequest) returns (SendBatchResponse);

  // RegisterChat links a Telegram chat ID to a user (by user UUID).
  rpc RegisterChat(RegisterChatRequest) returns (RegisterChatResponse);

  // LinkTelegram links a telegram_id to a user UUID (called after login).
  rpc LinkTelegram(LinkTelegramRequest) returns (LinkTelegramResponse);

  // UpdateSettings updates a user's notification preferences.
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);

  // GetSettings returns a user's notification preferences.
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);

  // UpdateGuildSettings updates per-guild notification preferences.
  rpc UpdateGuildSettings(UpdateGuildSettingsRequest) returns (UpdateGuildSettingsResponse);
}

enum NotificationKind {
  NOTIFICATION_KIND_UNSPECIFIED               = 0;
  NOTIFICATION_KIND_DUEL_INVITE               = 1;
  NOTIFICATION_KIND_DUEL_MATCH_FOUND          = 2;
  NOTIFICATION_KIND_DUEL_RESULT               = 3;
  NOTIFICATION_KIND_DUEL_WIN_STREAK           = 4;
  NOTIFICATION_KIND_STREAK_WARNING            = 5;
  NOTIFICATION_KIND_STREAK_MILESTONE          = 6;
  NOTIFICATION_KIND_RATING_MILESTONE          = 7;
  NOTIFICATION_KIND_MOCK_RESULT               = 8;
  NOTIFICATION_KIND_REVIEW_READY              = 9;
  NOTIFICATION_KIND_GUILD_EVENT_CREATED      = 10;
  NOTIFICATION_KIND_GUILD_EVENT_REMINDER     = 11;
  NOTIFICATION_KIND_GUILD_INVITE             = 12;
  NOTIFICATION_KIND_GUILD_CHALLENGE_COMPLETED = 13;
  NOTIFICATION_KIND_GUILD_MEMBER_JOINED      = 14;
  NOTIFICATION_KIND_GUILD_CHALLENGE_PROGRESS = 15;
  NOTIFICATION_KIND_GUILD_WEEKLY_DIGEST      = 16;
  NOTIFICATION_KIND_DAILY_CHALLENGE           = 17;
  NOTIFICATION_KIND_RE_ENGAGEMENT_GUILD      = 18;
  NOTIFICATION_KIND_RE_ENGAGEMENT_PERSONAL    = 19;
}

// ── Send ──────────────────────────────────────────────────────

message SendRequest {
  string user_id = 1;
  NotificationKind kind = 2;
  string title = 3;
  string body = 4;
  google.protobuf.Struct payload = 5;
  google.protobuf.Timestamp schedule_at = 6;
}

message SendResponse {
  string notification_id = 1;
}

// ── SendBatch ─────────────────────────────────────────────────

message SendBatchRequest {
  repeated string user_ids = 1;
  NotificationKind kind = 2;
  string title = 3;
  string body = 4;
  google.protobuf.Struct payload = 5;
}

message SendBatchResponse {
  int32 enqueued = 1;
}

// ── RegisterChat ──────────────────────────────────────────────

message RegisterChatRequest {
  string user_id = 1;
  int64 telegram_chat_id = 2;
}

message RegisterChatResponse {}

message LinkTelegramRequest {
  string user_id = 1;
  int64 telegram_id = 2;
}

message LinkTelegramResponse {}

// ── Settings ──────────────────────────────────────────────────

message UpdateSettingsRequest {
  string user_id = 1;
  optional bool duels_enabled = 2;
  optional bool progress_enabled = 3;
  optional bool guilds_enabled = 4;
  optional bool daily_challenge_enabled = 5;
  optional int32 quiet_hours_start = 6;
  optional int32 quiet_hours_end = 7;
  optional string timezone = 8;
}

message UpdateSettingsResponse {}

message GetSettingsRequest {
  string user_id = 1;
}

message GetSettingsResponse {
  bool duels_enabled = 1;
  bool progress_enabled = 2;
  bool guilds_enabled = 3;
  bool daily_challenge_enabled = 4;
  int32 quiet_hours_start = 5;
  int32 quiet_hours_end = 6;
  string timezone = 7;
  int64 telegram_chat_id = 8;
}

// ── Guild Settings ───────────────────────────────────────────

message UpdateGuildSettingsRequest {
  string user_id = 1;
  string guild_id = 2;
  optional bool events_enabled = 3;
  optional bool activity_enabled = 4;
  optional bool digest_enabled = 5;
  optional bool muted = 6;
}

message UpdateGuildSettingsResponse {}
