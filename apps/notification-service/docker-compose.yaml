services:
  postgres:
    image: postgres:15-alpine
    container_name: notification-service-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notification_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-notification_service}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - notification_service_network

volumes:
  postgres_data:

networks:
  notification_service_network:
    driver: bridge
