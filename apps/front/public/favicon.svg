<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#6366F1"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)" opacity="0.15"/>
  <!-- Triangle network: 3 nodes connected by lines -->
  <!-- Nodes: top-left (18,20), top-right (46,20), bottom-center (32,46) -->
  <line x1="18" y1="20" x2="46" y2="20" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="18" y1="20" x2="32" y2="46" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="46" y1="20" x2="32" y2="46" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.7"/>
  <circle cx="18" cy="20" r="6" fill="white"/>
  <circle cx="46" cy="20" r="6" fill="white"/>
  <circle cx="32" cy="46" r="6" fill="white"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
