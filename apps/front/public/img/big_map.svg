  </g>

  <g id="region-capital_market" class="region" data-centroid-x="790" data-centroid-y="494">
    <path fill="#8d7142" d="M640 340c83-75 227-71 306 7 83 82 78 222-9 297-88 76-229 68-308-16-78-83-72-214 11-288z"/>
    <path fill="#d8c28a" opacity=".55" d="M705 416h171v124H705z"/>
    <path fill="none" stroke="#241b13" stroke-width="6" d="M705 458h171M760 416v124M822 416v124"/>
    <circle class="marker" cx="790" cy="494" r="22"/>
    <text class="label" x="666" y="386">Столичный рынок</text>
  </g>

  <g id="region-east_archipelago" class="region" data-centroid-x="1220" data-centroid-y="530">
    <path fill="#6f8d73" d="M1068 358c53-53 130-54 173-7 38 41 32 107-14 144-54 44-142 26-170-35-15-33-11-73 11-102z"/>
    <path fill="#7da18f" d="M1242 495c38-35 93-32 123 3 29 34 24 87-11 114-42 31-103 18-126-27-14-28-9-64 14-90z"/>
    <path fill="#9aa56e" d="M1128 620c34-26 81-21 104 10 22 30 14 74-18 96-38 26-89 13-108-26-13-27-4-59 22-80z"/>
    <circle class="marker" cx="1170" cy="438" r="17"/>
    <circle class="marker" cx="1302" cy="555" r="15"/>
    <text class="label" x="1055" y="336">Восточный архипелаг</text>
  </g>

  <g id="region-south_dunes" class="region" data-centroid-x="710" data-centroid-y="765">
    <path fill="url(#dunes)" d="M556 610c80-54 170-24 243 20 65 39 119 13 178 47 63 37 83 113 41 171-56 77-196 78-309 55-121-25-218-85-234-160-11-52 22-94 81-133z"/>
    <path fill="none" stroke="#efd28a" stroke-width="6" opacity=".55" d="M560 730c92-48 173-47 266 2 69 36 133 37 200 5M522 796c121-44 209-33 290 15"/>
    <circle class="marker" cx="710" cy="765" r="18"/>
    <text class="label" x="596" y="698">Южные дюны</text>
  </g>

  <text class="label small" x="92" y="84">DRUZ9 TEMPORARY ATLAS</text>
  <text class="label small" x="1230" y="832">replaceable SVG · region ids embedded</text>
  <rect x="32" y="32" width="1536" height="836" rx="16" class="frame"/>
</svg>
