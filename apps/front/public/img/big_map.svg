<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">druz9 world atlas</title>
  <desc id="desc">Temporary structured fantasy atlas with region groups for extraction.</desc>
  <defs>
    <filter id="paper-noise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="9"/>
      <feColorMatrix type="saturate" values="0.25"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#233547"/>
      <stop offset="0.55" stop-color="#182a35"/>
      <stop offset="1" stop-color="#10212a"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9f8a5d"/>
      <stop offset="0.48" stop-color="#77643f"/>
      <stop offset="1" stop-color="#4d4631"/>
    </linearGradient>
    <linearGradient id="dunes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4934f"/>
      <stop offset="1" stop-color="#7c5431"/>
    </linearGradient>
    <linearGradient id="caverns" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b6b5d"/>
      <stop offset="1" stop-color="#34342d"/>
    </linearGradient>
    <linearGradient id="peaks" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9ddd6"/>
      <stop offset="0.42" stop-color="#8fa1a1"/>
      <stop offset="1" stop-color="#4e6768"/>
    </linearGradient>
    <style>
      .frame { fill: none; stroke: #d8c28a; stroke-width: 8; }
      .grid { fill: none; stroke: #d8c28a; stroke-width: 1; opacity: .12; }
      .coast { fill: url(#land); stroke: #241b13; stroke-width: 5; filter: url(#paper-noise); }
      .region { stroke: #241b13; stroke-width: 5; }
      .road { fill: none; stroke: #e0c879; stroke-width: 5; stroke-dasharray: 16 16; opacity: .55; }
      .label { font: 700 30px Georgia, serif; fill: #f6e7b8; stroke: #241b13; stroke-width: 5; paint-order: stroke; letter-spacing: .04em; }
      .small { font-size: 22px; opacity: .9; }
      .marker { fill: #ead18c; stroke: #241b13; stroke-width: 5; }
      .mountain { fill: #f2efe0; stroke: #33494b; stroke-width: 3; opacity: .9; }
      .wave { fill: none; stroke: #b7d4d2; stroke-width: 3; opacity: .28; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sea)"/>
  <path class="grid" d="M120 120H1480M120 240H1480M120 360H1480M120 480H1480M120 600H1480M120 720H1480M260 80V820M420 80V820M580 80V820M740 80V820M900 80V820M1060 80V820M1220 80V820M1380 80V820"/>
  <path class="wave" d="M95 210c60-28 112-28 172 0s112 28 172 0M1180 180c52-24 98-24 150 0s98 24 150 0M1020 770c44-20 86-20 130 0s86 20 130 0M160 735c52-24 98-24 150 0s98 24 150 0"/>

  <path class="coast" d="M270 312c68-118 194-178 322-153 60 12 86-36 139-58 104-44 205 15 252 100 29 52 97 27 154 48 114 43 178 159 147 268-27 93-108 144-198 159-83 14-111 78-195 96-95 20-158-38-225-86-70-50-126 6-215-8-122-19-211-111-221-233-4-49 15-88 40-133z"/>

  <path class="road" d="M319 560c140-60 257-68 415-30 164 39 303 22 456-58"/>
  <path class="road" d="M515 222c72 100 137 176 209 307 56 102 101 167 174 226"/>

  <g id="region-north_peaks" class="region" data-centroid-x="620" data-centroid-y="255">
    <path fill="url(#peaks)" d="M396 222c54-88 151-133 247-110 55 13 76-28 123-45 86-31 168 25 195 107 18 54-4 102-42 135-45 40-101 35-152 24-78-18-115 37-189 30-91-9-171-56-191-130-2-6 2-9 9-11z"/>
    <path class="mountain" d="M455 247l52-86 51 86zM560 253l70-116 72 116zM713 238l55-89 55 89zM836 243l42-68 43 68z"/>
    <circle class="marker" cx="620" cy="255" r="18"/>
    <text class="label" x="498" y="310">Северные вершины</text>
  </g>

  <g id="region-west_caverns" class="region" data-centroid-x="350" data-centroid-y="510">
    <path fill="url(#caverns)" d="M246 410c46-89 148-129 249-104 72 18 93 93 74 164-21 80-101 135-193 139-79 3-153-30-181-91-21-45 2-74 51-108z"/>
    <path fill="#211b16" opacity=".68" d="M322 449c31-41 98-46 130-8 22 25 21 64-6 90-29 28-90 27-119-3-22-24-24-53-5-79z"/>
    <circle class="marker" cx="350" cy="510" r="18"/>
