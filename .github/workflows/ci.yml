name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  api:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Run API tests
        run: go test ./...

  notification-service:
    name: Notification Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/notification-service/go.mod
          cache-dependency-path: apps/notification-service/go.sum

      - name: Run notification-service tests
        run: go test ./...

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/front/package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-config:
    name: Deploy Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy shell scripts
        run: |
          bash -n apps/deploy/scripts/deploy.sh
          bash -n apps/deploy/scripts/render-prod-values.sh

      - name: Validate production compose
        run: |
          docker compose \
            --env-file apps/deploy/.env.prod.example \
            -f apps/deploy/docker-compose.prod.yml \
            config >/dev/null