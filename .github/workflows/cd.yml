name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || secrets.ORACLE_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || secrets.ORACLE_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_SSH_KEY || secrets.ORACLE_SSH_KEY }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || secrets.ORACLE_SSH_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR != '' && secrets.DEPLOY_APP_DIR || secrets.ORACLE_APP_DIR || '/root/druz9' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Sync code on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_SSH_PORT }}
          script: |
            set -euo pipefail

            if [ ! -d "${{ env.DEPLOY_APP_DIR }}/.git" ]; then
              echo "Repository not found on server: ${{ env.DEPLOY_APP_DIR }}"
              echo "Create/clone it once manually, then rerun CD."
              exit 1
            fi

            cd "${{ env.DEPLOY_APP_DIR }}"
            git fetch origin
            git checkout master || git checkout main
            git reset --hard "${{ github.event.workflow_run.head_sha || github.sha }}"
            git clean -fd

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_HOST: ${{ secrets.APP_HOST }}
          API_HOST: ${{ secrets.API_HOST }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          TELEGRAM_BOT_NAME: ${{ secrets.TELEGRAM_BOT_NAME }}
          ARENA_REQUIRE_AUTH: ${{ secrets.ARENA_REQUIRE_AUTH }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          S3_PUBLIC_ENDPOINT: ${{ secrets.S3_PUBLIC_ENDPOINT }}
          S3_HOST: ${{ secrets.S3_HOST }}
          MINIO_CONSOLE_HOST: ${{ secrets.MINIO_CONSOLE_HOST }}
          MINIO_CONSOLE_BASIC_AUTH: ${{ secrets.MINIO_CONSOLE_BASIC_AUTH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_SSH_PORT }}
          envs: APP_HOST,API_HOST,APP_EMAIL,TELEGRAM_BOT_NAME,ARENA_REQUIRE_AUTH,POSTGRES_DB,POSTGRES_USER,S3_BUCKET,S3_REGION,COOKIE_DOMAIN,S3_PUBLIC_ENDPOINT,S3_HOST,MINIO_CONSOLE_HOST,MINIO_CONSOLE_BASIC_AUTH,DATABASE_URL,POSTGRES_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,S3_ACCESS_KEY,S3_SECRET_KEY,TELEGRAM_BOT_TOKEN
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_APP_DIR }}"

            mkdir -p apps/deploy/runtime/secrets/prod

            SAFE_MINIO_CONSOLE_BASIC_AUTH="${MINIO_CONSOLE_BASIC_AUTH//$/\$\$}"

            cat > apps/deploy/.env.prod <<EOF
            APP_HOST=${APP_HOST}
            API_HOST=${API_HOST}
            APP_EMAIL=${APP_EMAIL}
            TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
            ARENA_REQUIRE_AUTH=${ARENA_REQUIRE_AUTH}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            S3_BUCKET=${S3_BUCKET}
            S3_REGION=${S3_REGION}
            COOKIE_DOMAIN=${COOKIE_DOMAIN}
            S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}
            S3_HOST=${S3_HOST}
            MINIO_CONSOLE_HOST=${MINIO_CONSOLE_HOST}
            MINIO_CONSOLE_BASIC_AUTH='${SAFE_MINIO_CONSOLE_BASIC_AUTH}'
            DATABASE_URL=${DATABASE_URL}
            EOF

            cat > apps/deploy/runtime/values_prod.yaml <<EOF
            server_http_addr:
              usage: "HTTP server listen address"
              group: "server"
              value: ":8080"
              type: "string"
              writable: false

            server_http_timeout:
              usage: "HTTP server request timeout"
              group: "server"
              value: "10s"
              type: "duration"
              writable: false

            server_grpc_addr:
              usage: "gRPC server listen address"
              group: "server"
              value: ":9000"
              type: "string"
              writable: false

            server_grpc_timeout:
              usage: "gRPC server request timeout"
              group: "server"
              value: "10s"
              type: "duration"
              writable: false

            arena_require_auth:
              usage: "Require authentication for arena endpoints"
              group: "arena"
              value: "${ARENA_REQUIRE_AUTH}"
              type: "bool"
              writable: true

            database_url:
              usage: "Primary PostgreSQL DSN"
              group: "data"
              value: "${DATABASE_URL}"
              type: "string"
              writable: false

            cookie_domain:
              usage: "Session cookie domain"
              group: "auth"
              value: "${COOKIE_DOMAIN}"
              type: "string"
              writable: false

            cookie_secure:
              usage: "Use secure cookies"
              group: "auth"
              value: "true"
              type: "bool"
              writable: false

            cookie_same_site:
              usage: "Session cookie same-site policy"
              group: "auth"
              value: "None"
              type: "string"
              writable: false

            telegram_bot_token:
              usage: "Telegram bot token"
              group: "external"
              value: "${TELEGRAM_BOT_TOKEN}"
              type: "string"
              writable: false

            s3_endpoint:
              usage: "S3 endpoint"
              group: "external"
              value: "${S3_PUBLIC_ENDPOINT}"
              type: "string"
              writable: false

            s3_public_endpoint:
              usage: "Public S3 endpoint for signed URLs"
              group: "external"
              value: "${S3_PUBLIC_ENDPOINT}"
              type: "string"
              writable: false

            s3_bucket:
              usage: "S3 bucket name"
              group: "external"
              value: "${S3_BUCKET}"
              type: "string"
              writable: false

            s3_access_key:
              usage: "S3 access key"
              group: "external"
              value: "${S3_ACCESS_KEY}"
              type: "string"
              writable: false

            s3_secret_key:
              usage: "S3 secret key"
              group: "external"
              value: "${S3_SECRET_KEY}"
              type: "string"
              writable: false
            EOF

            printf '%s' "${DATABASE_URL}" > apps/deploy/runtime/secrets/prod/database_url
            printf '%s' "${POSTGRES_PASSWORD}" > apps/deploy/runtime/secrets/prod/postgres_password
            printf '%s' "${MINIO_ROOT_USER}" > apps/deploy/runtime/secrets/prod/minio_root_user
            printf '%s' "${MINIO_ROOT_PASSWORD}" > apps/deploy/runtime/secrets/prod/minio_root_password
            printf '%s' "${S3_ACCESS_KEY}" > apps/deploy/runtime/secrets/prod/s3_access_key
            printf '%s' "${S3_SECRET_KEY}" > apps/deploy/runtime/secrets/prod/s3_secret_key
            printf '%s' "${TELEGRAM_BOT_TOKEN}" > apps/deploy/runtime/secrets/prod/telegram_bot_token

            chmod 600 apps/deploy/.env.prod apps/deploy/runtime/secrets/prod/*

            if ! bash apps/deploy/scripts/deploy.sh; then
              echo "=== docker compose ps ==="
              docker compose --env-file apps/deploy/.env.prod -f apps/deploy/docker-compose.prod.yml ps -a || true

              echo "=== minio-init logs ==="
              docker compose --env-file apps/deploy/.env.prod -f apps/deploy/docker-compose.prod.yml logs --tail=200 minio-init || true

              echo "=== seed logs ==="
              docker compose --env-file apps/deploy/.env.prod -f apps/deploy/docker-compose.prod.yml logs --tail=200 seed || true

              echo "=== backend logs ==="
              docker compose --env-file apps/deploy/.env.prod -f apps/deploy/docker-compose.prod.yml logs --tail=200 backend || true

              exit 1
            fi